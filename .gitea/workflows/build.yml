name: Build & Test

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: https://gitea.com/actions/checkout@v4

      - name: Setup Java 21
        run: |
          apt-get update && apt-get install -y wget
          wget -q https://download.java.net/java/GA/jdk21/fd2272bbf8e04c3dbaee13770090416c/35/GPL/openjdk-21_linux-x64_bin.tar.gz
          tar -xzf openjdk-21_linux-x64_bin.tar.gz
          echo "JAVA_HOME=$PWD/jdk-21" >> $GITHUB_ENV
          echo "$PWD/jdk-21/bin" >> $GITHUB_PATH

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build
        run: ./gradlew build --no-daemon

      - name: Test
        run: ./gradlew test --no-daemon
