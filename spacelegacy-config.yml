# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║                        LoHub Configuration - SpaceLegacy                    ║
# ║                    Hub plugin for Paper/Folia 1.20.1+                      ║
# ╚══════════════════════════════════════════════════════════════════════════════╝

# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~#
# | GENERAL SETTINGS                         |
# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~#

check-updates: true

# Disabled worlds (plugin won't work there)
disabled-worlds:
  invert: false
  worlds:
    - world_nether
    - witp

# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~#
# | SPAWN SETTINGS                           |
# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~#

spawn:
  teleport-on-join: true
  teleport-on-respawn: true

# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~#
# | WORLDGUARD INTEGRATION                   |
# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~#

worldguard:
  auto-create-region: true
  region-radius: 100
  region-name: "lohub_spawn"

# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~#
# | WORLD PROTECTION                         |
# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~#

world_settings:
  disable_hunger_loss: true
  disable_fall_damage: true
  disable_player_pvp: true
  disable_void_death: true
  disable_fire_damage: true
  disable_drowning: true
  disable_off_hand_swap: true
  disable_weather_change: true
  disable_death_message: true
  disable_mob_spawning: true
  disable_item_drop: true
  disable_item_pickup: false
  disable_block_break: true
  disable_block_place: true
  disable_block_interact: true
  disable_block_burn: true
  disable_block_fire_spread: true
  disable_block_leaf_decay: true

# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~#
# | LAUNCHPAD                                |
# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~#

launchpad:
  enabled: true
  launch_power: 3.0
  launch_power_y: 1.0
  top_block: STONE_PRESSURE_PLATE
  bottom_block: REDSTONE_BLOCK
  actions:
    - '[SOUND] ENTITY_BAT_TAKEOFF'

# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~#
# | DOUBLE JUMP                              |
# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~#

double_jump:
  enabled: false
  launch_power: 1.0
  launch_power_y: 0.9
  cooldown: 3
  actions:
    - '[SOUND] ENTITY_BAT_TAKEOFF'

# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~#
# | COMMAND BLOCKER                          |
# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~#

command_block:
  enabled: true
  blocked_commands:
    - /pl
    - /plugins
    - /?
    - /bukkit:?
    - /bukkit:plugins
    - /bukkit:pl
    - /bukkit:help
    - /ver
    - /version
    - /bukkit:version
    - /bukkit:ver

# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~#
# | ANTI-SWEAR                               |
# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~#

anti_swear:
  enabled: true
  blocked_words:
    - блять
    - сука
    - пизда
    - хуй
    - ебать

# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~#
# | PLAYER JOIN                              |
# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~#

join_leave_messages:
  enabled: true
  join_message: "&#B798A8&l▶ &#7858E9%player% &7присоединился"
  quit_message: "&c&l◀ &#B798A8%player% &7вышел"

# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~#
# | SERVER SWITCH MESSAGES                   |
# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~#

server_switch_messages:
  enabled: true
  switch_message: "&#B798A8&l▶ &#7858E9%player% &7подключился к &#B798A8%server%"
  server_names:
    hub: "Хабу"
    vanilla: "Ванилле"
    grif: "Грифу"
    darktown: "Даркауну"

join_events:
  - "[CONSOLE] effect clear %player%"
  - "[MESSAGE] &#B798A8&m━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
  - "[MESSAGE] &r"
  - "[MESSAGE] &7Добро пожаловать, &#7858E9&n%player%&r&7!"
  - "[MESSAGE] &r"
  - "[MESSAGE] &#B798A8&l♦ &#B798A8s&#B192AFp&#AA8BB5a&#A485BCc&#9E7EC2e&#9878C9l&#9172CFe&#8B6BD6g&#8565DCa&#7E5EE3c&#7858E9y"
  - "[MESSAGE] &#B798A8&l♦ САЙТ &#7858E9spacelegacy.ru"
  - "[MESSAGE] &#B798A8&l♦ DISCORD &f/discord"
  - "[MESSAGE] &r"
  - "[MESSAGE] &7&oЖелаем приятной игры!"
  - "[MESSAGE] &#B798A8&m━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
  - "[TITLE] &#B798A8s&#B192AFp&#AA8BB5a&#A485BCc&#9E7EC2e&#9878C9l&#9172CFe&#8B6BD6g&#8565DCa&#7E5EE3c&#7858E9y;&fДобро пожаловать!;1;3;1"
  - "[SOUND] ENTITY_PLAYER_LEVELUP"
  - "[GAMEMODE] survival"

join_settings:
  spawn_join: true
  heal: true
  extinguish: true
  clear_inventory: false
  
  firework:
    enabled: true
    first_join_only: true
    type: BALL_LARGE
    power: 1
    flicker: true
    trail: true
    colors:
      - PURPLE
      - WHITE
      - BLUE

# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~#
# | CUSTOM JOIN ITEMS                        |
# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~#

custom_join_items:
  enabled: true
  disable_inventory_movement: true
  
  items:
    parkour:
      material: FEATHER
      amount: 1
      slot: 0
      display_name: "&#B798A8&l♦ &#7858E9Паркур"
      lore:
        - "&7Нажми ПКМ, чтобы перейти на паркур"
      actions:
        - "[MESSAGE] &#B798A8&m━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        - "[MESSAGE] &#B798A8&l♦ &fТелепортация на &#7858E9Паркур&f..."
        - "[MESSAGE] &#B798A8&m━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        - "[CONSOLE] ip forcejoin %player%"
        - "[SOUND] ENTITY_ENDERMAN_TELEPORT"
    
    server_selector:
      material: NETHER_STAR
      amount: 1
      slot: 4
      display_name: "&#B798A8&l♦ &#7858E9Выбор Режима"
      lore:
        - "&7Нажми ПКМ, чтобы выбрать режим"
      actions:
        - "[MENU] serverselector"
    
    player_hider:
      material: LIME_DYE
      amount: 1
      slot: 8
      display_name: '&a&l♦ &#7858E9Игроки видны &7(ПКМ)'
      lore:
        - '&7Скрыть лишних игроков'
      actions:
        - "[PLAYER_HIDER]"

# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~#
# | PLAYER HIDER                             |
# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~#

player_hider:
  enabled: true
  slot: 8
  disable_inventory_movement: true
  cooldown: 3
  
  not_hidden:
    material: LIME_DYE
    amount: 1
    display_name: '&a&l♦ &#7858E9Игроки видны &7(ПКМ)'
    lore:
      - '&7Нажми, чтобы скрыть'
  
  hidden:
    material: GRAY_DYE
    amount: 1
    display_name: '&c&l♦ &#B798A8Игроки скрыты &7(ПКМ)'
    lore:
      - '&7Нажми, чтобы показать'

