# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║                          LoChat Custom Commands                             ║
# ║                           Кастомные команды                                ║
# ║                              Версия: 1.5.5-1.20.1                          ║
# ╚══════════════════════════════════════════════════════════════════════════════╝

# ┌─────────────────────────────────────────────────────────────────────────────┐
# │                         НАСТРОЙКИ КОМАНД                                   │
# └─────────────────────────────────────────────────────────────────────────────┘

settings:
  # Включить кастомные команды
  enabled: true
  
  # Настройки Discord команды
  discord:
    invite-link: "discord.gg/example"
    
  # Настройки Website команды  
  website:
    url: "https://example.com"
    
  # Настройки координат
  coords:
    show-in-actionbar: true
    actionbar-duration: 60
    
  # Настройки /me команды
  me:
    radius: 100  # Радиус для локального действия
    
  # Настройки звуков
  sounds:
    allow-toggle: true
    
  # Настройки статистики
  stats:
    show-server-stats: true
    show-player-stats: true

# ┌─────────────────────────────────────────────────────────────────────────────┐
# │                         ТЕКСТОВЫЕ КОМАНДЫ                                  │
# └─────────────────────────────────────────────────────────────────────────────┘

# Структура команды:
# command-name:
#   permission: "право.для.использования"  # Опционально
#   message: "Текст сообщения"             # Обязательно
#   aliases: ["alias1", "alias2"]          # Опционально
#   type: "chat"                           # chat, broadcast, title, actionbar
#   target: "sender"                       # sender, all, permission:право

# ═══════════════════════════════════════════════════════════════════════════════
#                              ИНФОРМАЦИОННЫЕ КОМАНДЫ
# ═══════════════════════════════════════════════════════════════════════════════

help:
  message: |
    <gradient:#FFD700:#FFA500>═══════ Помощь по серверу ═══════</gradient>
    <gradient:#87CEEB:#4682B4>/rules</gradient> <gray>- правила сервера</gray>
    <gradient:#87CEEB:#4682B4>/discord</gradient> <gray>- наш Discord</gray>
    <gradient:#87CEEB:#4682B4>/website</gradient> <gray>- официальный сайт</gray>
    <gradient:#87CEEB:#4682B4>/coords</gradient> <gray>- ваши координаты</gray>
    <gradient:#87CEEB:#4682B4>/time</gradient> <gray>- время на сервере</gray>
  aliases: [ "помощь", "хелп" ]
  type: "chat"
  target: "sender"

rules:
  message: |
    <gradient:#FF6B6B:#FF4757>═══════ Правила сервера ═══════</gradient>
    <white>1.</white> <gray>Не используйте читы и моды</gray>
    <white>2.</white> <gray>Уважайте других игроков</gray>
    <white>3.</white> <gray>Не спамьте в чате</gray>
    <white>4.</white> <gray>Не стройте рядом с чужими постройками</gray>
    <white>5.</white> <gray>Не используйте мат и оскорбления</gray>
    
    <gradient:#FFA726:#FF9800>Нарушение правил карается мутом или баном!</gradient>
  aliases: [ "правила", "rule" ]
  type: "chat"
  target: "sender"

discord:
  message: |
    <gradient:#7289DA:#5865F2>═══════ Наш Discord ═══════</gradient>
    <gray>Присоединяйтесь к нашему сообществу!</gray>
    
    <click:open_url:'https://discord.gg/example'><gradient:#87CEEB:#4682B4>🔗 discord.gg/example</gradient></click>
    
    <gray>В Discord вы можете:</gray>
    <white>•</white> <gray>Общаться с игроками</gray>
    <white>•</white> <gray>Получать новости сервера</gray>
    <white>•</white> <gray>Участвовать в событиях</gray>
  aliases: [ "дискорд", "ds" ]
  type: "chat"
  target: "sender"

website:
  message: |
    <gradient:#00FF88:#00CC66>═══════ Официальный сайт ═══════</gradient>
    <click:open_url:'https://example.com'><gradient:#87CEEB:#4682B4>🌐 example.com</gradient></click>
    
    <gray>На сайте доступно:</gray>
    <white>•</white> <gray>Карта сервера</gray>
    <white>•</white> <gray>Статистика игроков</gray>
    <white>•</white> <gray>Форум и новости</gray>
  aliases: [ "сайт", "site" ]
  type: "chat"
  target: "sender"

# ═══════════════════════════════════════════════════════════════════════════════
#                              УТИЛИТЫ
# ═══════════════════════════════════════════════════════════════════════════════

coords:
  message: |
    <gradient:#FFA726:#FF9800>Ваши координаты:</gradient>
    <gradient:#87CEEB:#4682B4>X:</gradient> <white>{x}</white>
    <gradient:#87CEEB:#4682B4>Y:</gradient> <white>{y}</white>
    <gradient:#87CEEB:#4682B4>Z:</gradient> <white>{z}</white>
    <gradient:#87CEEB:#4682B4>Мир:</gradient> <white>{world}</white>
  aliases: [ "координаты", "pos", "position" ]
  type: "actionbar"
  target: "sender"

time:
  message: |
    <gradient:#87CEEB:#4682B4>Время на сервере:</gradient> <white>%server_time_24%</white>
    <gradient:#87CEEB:#4682B4>Дата:</gradient> <white>%server_date%</white>
    <gradient:#87CEEB:#4682B4>Онлайн:</gradient> <white>%server_online%</white> <gray>игроков</gray>
  aliases: [ "время", "дата" ]
  type: "chat"
  target: "sender"

# ═══════════════════════════════════════════════════════════════════════════════
#                              АДМИНСКИЕ КОМАНДЫ
# ═══════════════════════════════════════════════════════════════════════════════

restart-warning:
  permission: "lochat.admin"
  message: |
    <gradient:#FF6B6B:#FF4757>⚠ ВНИМАНИЕ! ⚠</gradient>
    <gradient:#FFA726:#FF9800>Сервер будет перезагружен через 5 минут!</gradient>
    <gray>Сохраните свой прогресс и подготовьтесь к перезагрузке.</gray>
  aliases: [ "рестарт", "reboot" ]
  type: "title"
  target: "all"

maintenance:
  permission: "lochat.admin"
  message: |
    <gradient:#FF6B6B:#FF4757>Сервер переходит в режим технических работ</gradient>
    <gray>Ожидаемое время: 30 минут</gray>
  aliases: [ "тех-работы", "maintenance" ]
  type: "broadcast"
  target: "all"

# ═══════════════════════════════════════════════════════════════════════════════
#                              VIP КОМАНДЫ
# ═══════════════════════════════════════════════════════════════════════════════

vip-info:
  permission: "lochat.vip"
  message: |
    <gradient:#FFD700:#FFA500>═══════ VIP Привилегии ═══════</gradient>
    <white>•</white> <gray>Цветной ник и префикс</gray>
    <white>•</white> <gray>Приоритет входа на сервер</gray>
    <white>•</white> <gray>Дополнительные команды</gray>
    <white>•</white> <gray>Больше возможностей в чате</gray>
    
    <gradient:#6BCB77:#4ECDC4>Спасибо за поддержку сервера!</gradient>
  type: "chat"
  target: "permission:lochat.vip"

# ═══════════════════════════════════════════════════════════════════════════════
#                              РАЗВЛЕКАТЕЛЬНЫЕ КОМАНДЫ
# ═══════════════════════════════════════════════════════════════════════════════

welcome:
  message: |
    <gradient:#FFD700:#FFA500>Добро пожаловать на сервер!</gradient>
    <gradient:#87CEEB:#4682B4>Игрок {player} присоединился к игре</gradient>
  aliases: [ "привет", "hello" ]
  type: "title"
  target: "sender"

# ┌─────────────────────────────────────────────────────────────────────────────┐
# │                            ПЛЕЙСХОЛДЕРЫ                                    │
# └─────────────────────────────────────────────────────────────────────────────┘

# Доступные плейсхолдеры в сообщениях:
# {player} - имя игрока
# {x}, {y}, {z} - координаты игрока
# {world} - название мира
# {arg0}, {arg1}, {arg2} - аргументы команды (нумерация с 0)
# {args} - все аргументы через пробел
# 
# Также поддерживаются все плейсхолдеры PlaceholderAPI:
# %player_name% - имя игрока
# %server_online% - количество игроков онлайн
# %server_time_24% - время в формате 24 часа
# %server_date% - текущая дата
# И многие другие...