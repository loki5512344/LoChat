# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║                        LoChat — Фильтры чата                                 ║
# ╚══════════════════════════════════════════════════════════════════════════════╝

# ┌─────────────────────────────────────────────────────────────────────────────┐
# │ Мат-фильтр                                                                   │
# └─────────────────────────────────────────────────────────────────────────────┘
# Использует badwords.txt для списка слов
# Автоматически ловит замены букв: х->x, о->o, е->e и т.д.
# Обход: lochat.bypass.swear

swear:
  enabled: true
  replace: false          # true = заменять на ***, false = блокировать сообщение
  replacement: "***"

# ┌─────────────────────────────────────────────────────────────────────────────┐
# │ URL фильтр                                                                   │
# └─────────────────────────────────────────────────────────────────────────────┘
# Блокирует ссылки в чате
# Обход: lochat.bypass.urlfilter

url:
  enabled: true
  replacement: "[ссылка скрыта]"

# ┌─────────────────────────────────────────────────────────────────────────────┐
# │ IP фильтр                                                                    │
# └─────────────────────────────────────────────────────────────────────────────┘
# Блокирует IP адреса в чате
# Обход: lochat.bypass.ipfilter

ip:
  enabled: true
  replacement: "[IP скрыт]"

# ┌─────────────────────────────────────────────────────────────────────────────┐
# │ Скрытые URL (discord.gg и т.д.)                                             │
# └─────────────────────────────────────────────────────────────────────────────┘
# Блокирует популярные сокращенные ссылки
# Обход: lochat.bypass.hiddenurls

hidden-urls:
  enabled: true
  patterns:
    - "discord\\.gg"
    - "dsc\\.gg"
    - "bit\\.ly"
    - "tinyurl\\.com"
    - "goo\\.gl"

# ┌─────────────────────────────────────────────────────────────────────────────┐
# │ Анти-спам                                                                    │
# └─────────────────────────────────────────────────────────────────────────────┘
# Блокирует повторяющиеся символы (ааааааа, хххххх)
# Обход: lochat.bypass.spam

spam:
  enabled: true
  max-repeating-chars: 5  # Максимум повторений одного символа

# ┌─────────────────────────────────────────────────────────────────────────────┐
# │ Анти-флуд                                                                    │
# └─────────────────────────────────────────────────────────────────────────────┘
# Блокирует одинаковые сообщения подряд
# Обход: lochat.bypass.flood

flood:
  enabled: true
  max-same-messages: 3    # Сколько раз можно отправить одно и то же

# ┌─────────────────────────────────────────────────────────────────────────────┐
# │ Капс-фильтр                                                                  │
# └─────────────────────────────────────────────────────────────────────────────┘
# Блокирует сообщения с большим количеством заглавных букв
# Обход: lochat.bypass.caps

caps:
  enabled: true
  max-caps-percent: 70    # Максимум % заглавных букв
  min-length: 5           # Минимальная длина для проверки
