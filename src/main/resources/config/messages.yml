# LoChat system messages
# Internal messages for commands, filters, moderation, and general feedback.

# ── Commands ───────────────────────────────────────────────────────────────────

commands:
  mute:
    usage: "&cUsage: &f/mute <player> [time] [-s] [reason]"
    time-help: "&7Time format: &f1d&7, &f2h&7, &f30m&7, &f60s&7, &fperm"
    silent-help: "&7-s &7= silent mute (requires &flochat.mute.silent&7)"
    no-silent-permission: "&cNo permission for silent mute"
    default-reason: "No reason specified"
    default-duration: "7d"

  cooldown:
    message: "&cPlease wait &f{remaining} &cseconds"

  clear-chat:
    lines-cleared: "&aChat cleared &7({lines} lines)"
    no-permission: "&cNo permission to clear chat"

# ── Local Chat ─────────────────────────────────────────────────────────────────

local-chat:
  nobody-heard: "&7Nobody heard you — no players nearby"
  no-players-nearby: "&7No players nearby"

# ── Filters ────────────────────────────────────────────────────────────────────

filters:
  caps:
    min-length: 3
    blocked-message: "&cPlease don't shout"
    auto-lowercase-notice: "&7Message auto-corrected"
  spam:
    blocked-message: "&cDo not spam"
    similar-message: "&cYou already sent a similar message"
  swear:
    blocked-message: "&cInappropriate language"
    replaced-notice: "&7Some words were replaced"

# ── Mute Messages ──────────────────────────────────────────────────────────────

mute:
  muted-message: "&cYou are muted! &7Reason: &f{reason}&7. Remaining: &f{time}"
  muted-permanent: "&cYou are permanently muted! &7Reason: &f{reason}"
  player-muted: "&aPlayer &f{player} &amuted for &f{time}&a. Reason: &7{reason}"
  player-muted-permanent: "&aPlayer &f{player} &amuted permanently. Reason: &7{reason}"
  player-muted-silent: "&8[&7SILENT&8] &f{player} &7muted for &f{time}"
  player-unmuted: "&aPlayer &f{player} &aunmuted"
  not-muted: "&7Player &f{player} &7is not muted"
  player-not-found: "&cPlayer not found!"
  invalid-time: "&cInvalid time format!"
  already-muted: "&cPlayer is already muted!"
  no-silent-unmute-permission: "&cNo permission for silent unmute"

# ── Gamemodes ──────────────────────────────────────────────────────────────────

gamemodes:
  survival: "Survival"
  creative: "Creative"
  adventure: "Adventure"
  spectator: "Spectator"

# ── Private Messages ───────────────────────────────────────────────────────────

private-messages:
  no-reply-target: "&cNobody to reply to"
  message-sent: "&aMessage sent to &f{player}"
  player-offline: "&cPlayer &f{player} &cis not online"
  cannot-message-self: "&cYou cannot message yourself"

# ── Ignore ─────────────────────────────────────────────────────────────────────

ignore:
  player-ignored: "&aPlayer &f{player} &ais now ignored"
  player-unignored: "&aPlayer &f{player} &ais no longer ignored"
  already-ignored: "&7Player &f{player} &7is already ignored"
  not-ignored: "&7Player &f{player} &7is not ignored"
  cannot-ignore-self: "&cYou cannot ignore yourself"
  ignore-list-empty: "&7Your ignore list is empty"
  ignore-list-header: "&7Ignored players:"

# ── General ────────────────────────────────────────────────────────────────────

general:
  no-permission: "&cNo permission!"
  player-only: "&cPlayers only!"
  invalid-arguments: "&cInvalid arguments!"
  command-disabled: "&cCommand disabled!"
  feature-disabled: "&cFeature disabled!"
  player-not-found: "&cPlayer not found!"
  time-formats:
    seconds: "s"
    minutes: "m"
    hours: "h"
    days: "d"
    permanent: "permanent"
  enabled: "&aEnabled"
  disabled: "&7Disabled"
  online: "&aOnline"
  offline: "&7Offline"

# ── Moderation ─────────────────────────────────────────────────────────────────

moderation:
  default-reason: "No reason specified"
  duration-permanent: "permanent"
  warn-received: "&6\u26A0 &cYou received a warning! &7Reason: &f{reason}"
  warn-staff-confirm: "&aPlayer &f{player} &awarned. &7Reason: &f{reason}"
  silent-warn-staff: "&8[&7SILENT&8] &f{player}&7: &7{reason}"
  ban-usage: "&cUsage: &f/lban <player> [time|perm] [reason]"
  ban-confirm: "&aPlayer &f{player} &abanned. &7Duration: &f{duration}"
  unban-confirm: "&aBan lifted for &f{player}"
  not-banned: "&cPlayer is not banned!"
  already-banned: "&cPlayer is already banned!"
  warn-usage: "&cUsage: &f/warn <player> [reason]"
  silent-warn-usage: "&cUsage: &f/silentwarn <player> [reason]"
  ban-kick-message: |
    <red><bold>You are banned from this server.</bold></red>
    <gray>Reason: <white>{reason}</white></gray>
    <gray>Moderator: <white>{moderator}</white></gray>
    <gray>Duration: <white>{duration}</white></gray>
