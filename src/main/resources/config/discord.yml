# LoChat Discord integration
# Relays chat messages and server events to a Discord channel via webhook.

# ── General ────────────────────────────────────────────────────────────────────

enabled: true

# ── Webhook ────────────────────────────────────────────────────────────────────

webhook:
  url: "https://discord.com/api/webhooks/YOUR_WEBHOOK_ID/YOUR_WEBHOOK_TOKEN"
  username: "Minecraft"
  avatar-url: "https://mc-heads.net/avatar/minecraft/64"

# ── Chat Relay ─────────────────────────────────────────────────────────────────

chat:
  enabled: true
  global-only: true
  format: "**{player}**: {message}"
  embed-color: "5865F2"
  use-embed: true

# ── Events ─────────────────────────────────────────────────────────────────────

events:
  enabled: true

  join:
    enabled: true
    title: "Player joined"
    description: "**{player}** joined the server"
    color: "00FF00"
    thumbnail: "https://mc-heads.net/avatar/{player}/64"

  quit:
    enabled: true
    title: "Player left"
    description: "**{player}** left the server"
    color: "FF0000"
    thumbnail: "https://mc-heads.net/avatar/{player}/64"

  death:
    enabled: true
    player-kill:
      title: "PvP kill"
      description: "**{player}** was killed by **{killer}** using **{weapon}**"
      color: "FF0000"
    mob-kill:
      title: "Mob kill"
      description: "**{player}** was slain by **{killer}**"
      color: "800080"
    default:
      title: "Player died"
      description: "**{player}** {death_message}"
      color: "800080"
    thumbnail: "https://mc-heads.net/avatar/{player}/64"

# ── Filtering ──────────────────────────────────────────────────────────────────

filter:
  ignore-bots: true
  min-message-length: 1
  max-message-length: 2000
  sanitize-mentions: true

# ── Performance ────────────────────────────────────────────────────────────────

performance:
  async: true
  timeout: 10
  retry-attempts: 3
  retry-delay: 1000
