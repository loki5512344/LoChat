# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║                          LoChat Beautiful Chat Formats                     ║
# ║                           Красивые форматы чата                            ║
# ║                              Версия: 1.5.5-1.20.1                          ║
# ╚══════════════════════════════════════════════════════════════════════════════╝

# ┌─────────────────────────────────────────────────────────────────────────────┐
# │                            КРАСИВЫЕ ФОРМАТЫ ЧАТА                           │
# └─────────────────────────────────────────────────────────────────────────────┘

# Настройки отображения чата
chat:
  # Включить красивые префиксы
  beautiful_prefixes: true
  
  # Включить hover эффекты на никах
  hover:
    enabled: true
    # Формат hover подсказки (поддерживает MiniMessage)
    format:
      - "<gradient:#FFD700:#FFA500><bold>▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬</bold></gradient>"
      - "<gradient:#87CEEB:#4169E1><bold>👤 Информация об игроке</bold></gradient>"
      - ""
      - "<gray>🏷️ Имя: <white><bold>{player}</bold>"
      - "<gray>📶 Пинг: <yellow><bold>{ping}ms</bold>"
      - "<gray>❤️ Здоровье: <red><bold>{health}/20</bold>"
      - "<gray>🍖 Голод: <gold><bold>{food}/20</bold>"
      - ""
      - "<gradient:#FFD700:#FFA500><bold>▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬</bold></gradient>"
      - "<yellow>💬 <bold>Клик:</bold> <gray>написать личное сообщение"

# Настройки глобального чата
global:
  # Префикс глобального чата
  prefix:
    # Использовать эмодзи
    emoji: "🌍"
    # Текст с градиентом
    text: "GLOBAL"
    # Цвета градиента (от -> к)
    gradient:
      from: "#FFD700"
      to: "#FF4500"
  
  # Разделитель между префиксом и ником
  separator:
    text: " ▶ "
    color: "#FFD700"

# Настройки локального чата  
local:
  # Префикс локального чата
  prefix:
    # Использовать эмодзи
    emoji: "📍"
    # Текст с градиентом
    text: "LOCAL"
    # Цвета градиента (от -> к)
    gradient:
      from: "#87CEEB"
      to: "#4169E1"
  
  # Разделитель между префиксом и ником
  separator:
    text: " ▶ "
    color: "#87CEEB"
    
  # Радиус локального чата (блоки)
  radius: 100

# Настройки эмодзи
emojis:
  # Включить обработку эмодзи
  enabled: true
  
  # Список доступных эмодзи (символы для Minecraft)
  list:
    # Основные
    ":heart:": "♥"
    ":star:": "★"
    ":check:": "✓"
    ":cross:": "✗"
    ":arrow:": "→"
    ":fire:": "▲"
    ":snowflake:": "❄"
    ":sun:": "☀"
    ":moon:": "☽"
    
    # Minecraft
    ":diamond:": "◆"
    ":sword:": "⚔"
    ":pickaxe:": "⛏"
    ":bow:": "⌐"
    ":shield:": "▣"
    ":potion:": "⚗"
    ":book:": "▤"
    ":crown:": "♔"
    ":emerald:": "◈"
    ":gold:": "◉"
    ":iron:": "◎"
    
    # Эмоции (текстовые)
    ":thumbsup:": "▲"
    ":thumbsdown:": "▼"
    ":clap:": "※"
    ":wave:": "~"
    ":ok:": "◯"
    ":thinking:": "?"
    ":laugh:": "xD"
    ":cry:": ":'("
    ":rage:": ">:("
    ":cool:": "B)"
    ":wink:": ";)"

# Настройки URL обработки
urls:
  # Включить кликабельные ссылки
  enabled: true
  # Цвет ссылок
  color: "#00BFFF"
  # Подчеркивание
  underlined: true
  # Hover текст
  hover_text: "🔗 Открыть ссылку: {url}"

# Настройки упоминаний (@player)
mentions:
  # Включить упоминания
  enabled: true
  # Цвет упоминания
  color: "#FFD700"
  # Звук при упоминании
  sound:
    enabled: true
    type: "BLOCK_NOTE_BLOCK_PLING"
    volume: 1.0
    pitch: 2.0

# ┌─────────────────────────────────────────────────────────────────────────────┐
# │                         ФОРМАТЫ ПО ГРУППАМ                                 │
# └─────────────────────────────────────────────────────────────────────────────┘

groups:
  owner:
    priority: 1000
    prefix: "&#FF0000[OWNER]"
    suffix: ""
    name-color: "&#FF0000"
  
  admin:
    priority: 900
    prefix: "&#FF6B6B[ADMIN]"
    suffix: ""
    name-color: "&#FF6B6B"
  
  moderator:
    priority: 800
    prefix: "&#FFA726[MOD]"
    suffix: ""
    name-color: "&#FFA726"
  
  helper:
    priority: 700
    prefix: "&#87CEEB[HELPER]"
    suffix: ""
    name-color: "&#87CEEB"
  
  vip:
    priority: 600
    prefix: "&#FFD700[VIP]"
    suffix: ""
    name-color: "&#FFD700"
  
  premium:
    priority: 500
    prefix: "&#6BCB77[PREMIUM]"
    suffix: ""
    name-color: "&#6BCB77"
  
  default:
    priority: 0
    prefix: ""
    suffix: ""
    name-color: "&#FFFFFF"

# ┌─────────────────────────────────────────────────────────────────────────────┐
# │                         СПЕЦИАЛЬНЫЕ ФОРМАТЫ                                │
# └─────────────────────────────────────────────────────────────────────────────┘

special:
  # Формат для мутов
  mute:
    message: "&#FF6B6BВы замучены! Осталось: {time}"
    permanent: "&#FF6B6BВы замучены навсегда!"
  
  # Формат для упоминаний
  mention:
    format: "&#FFFF00@{player}"
    sound: "BLOCK_NOTE_BLOCK_PLING"
    volume: 1.0
    pitch: 1.0
  
  # Формат для ссылок
  url:
    format: "<click:open_url:'{url}'><hover:show_text:'<gray>🔗 Открыть ссылку'><u><#00BFFF>{url}</u></hover></click>"
    
# ┌─────────────────────────────────────────────────────────────────────────────┐
# │                         НАСТРОЙКИ ОТОБРАЖЕНИЯ                              │
# └─────────────────────────────────────────────────────────────────────────────┘

display:
  # Максимальная длина сообщения
  max-message-length: 256
  
  # Показывать время в чате
  show-time: false
  time-format: "[HH:mm]"
  
  # Показывать мир в чате
  show-world: false
  world-format: "[{world}]"
  
  # Компактный режим (убирает лишние пробелы)
  compact-mode: false
  
  # Автоматически переносить длинные сообщения
  word-wrap: true
  
  # Цвет сообщений по умолчанию
  default-message-color: "&#FFFFFF"