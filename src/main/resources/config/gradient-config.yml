    permission: "gradient.preset.lava"
    price: 150

# ┌─────────────────────────────────────────────────────────────────────────────┐
# │                         НАСТРОЙКИ БАЗЫ ДАННЫХ                              │
# └─────────────────────────────────────────────────────────────────────────────┘

database:
  mysql:
    host: "localhost"
    port: 3306
    database: "lochat"
    username: "root"
    password: "password"
    table-prefix: "lochat_"
    
    # Настройки пула соединений
    pool:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  
  sqlite:
    file: "plugins/LoChat/gradient-data.db"

# ┌─────────────────────────────────────────────────────────────────────────────┐
# │                         ДОПОЛНИТЕЛЬНЫЕ ФУНКЦИИ                             │
# └─────────────────────────────────────────────────────────────────────────────┘

features:
  # Анимированные градиенты
  animated-gradients:
    enabled: false
    speed: 1000  # миллисекунды
    
  # Случайные градиенты
  random-gradients:
    enabled: true
    change-interval: 3600  # секунды (1 час)
    
  # Градиенты в чате
  chat-gradients:
    enabled: true
    apply-to-messages: true
    
  # Градиенты в табе
  tab-gradients:
    enabled: true
    update-interval: 20  # тики
    
  # Сохранение градиентов при выходе
  save-on-quit: true
  
  # Восстановление градиентов при входе
  restore-on-join: true

# ┌─────────────────────────────────────────────────────────────────────────────┐
# │                            ПРАВА ДОСТУПА                                   │
# └─────────────────────────────────────────────────────────────────────────────┘

permissions:
  # Базовые права
  use-gradient: "gradient.use"
  use-prefix: "gradient.prefix"
  admin: "gradient.admin"
  
  # Обход ограничений
  bypass-cooldown: "gradient.bypass.cooldown"
  bypass-cost: "gradient.bypass.cost"
  bypass-length: "gradient.bypass.length"
  
  # Дополнительные цвета
  extra-colors:
    "gradient.colors.5": 5
    "gradient.colors.10": 10
    "gradient.colors.15": 15
    "gradient.colors.unlimited": 999

# ┌─────────────────────────────────────────────────────────────────────────────┐
# │                            ФОРМАТИРОВАНИЕ                                  │
# └─────────────────────────────────────────────────────────────────────────────┘

formatting:
  # Формат ника с градиентом
  nick-format: "{gradient}{nick}"
  
  # Формат префикса с градиентом
  prefix-format: "{gradient}{prefix}"
  
  # Формат в табе
  tab-format: "{prefix} {gradient}{nick}"
  
  # Формат в чате
  chat-format: "{prefix} {gradient}{nick}&r: {message}"
  
  # Разделитель между префиксом и ником
  separator: " "