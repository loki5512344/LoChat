    name: "Огонь"
    colors: [ "#FF4500", "#FF6347", "#FFD700" ]
    permission: "gradient.preset.fire"
    price: 100
  
  ocean:
    name: "Океан"
    colors: [ "#00CED1", "#1E90FF", "#4169E1" ]
    permission: "gradient.preset.ocean"
    price: 100
  
  forest:
    name: "Лес"
    colors: [ "#228B22", "#32CD32", "#90EE90" ]
    permission: "gradient.preset.forest"
    price: 100
  
  sunset:
    name: "Закат"
    colors: [ "#FF69B4", "#FF1493", "#DC143C" ]
    permission: "gradient.preset.sunset"
    price: 150
  
  rainbow:
    name: "Радуга"
    colors: [ "#FF0000", "#FF7F00", "#FFFF00", "#00FF00", "#0000FF", "#4B0082", "#9400D3" ]
    permission: "gradient.preset.rainbow"
    price: 300
  
  gold:
    name: "Золото"
    colors: [ "#FFD700", "#FFA500", "#FF8C00" ]
    permission: "gradient.preset.gold"
    price: 200
  
  silver:
    name: "Серебро"
    colors: [ "#C0C0C0", "#A9A9A9", "#808080" ]
    permission: "gradient.preset.silver"
    price: 150
  
  purple:
    name: "Фиолетовый"
    colors: [ "#9400D3", "#8A2BE2", "#DA70D6" ]
    permission: "gradient.preset.purple"
    price: 120
  
  ice:
    name: "Лёд"
    colors: [ "#B0E0E6", "#87CEEB", "#4682B4" ]
    permission: "gradient.preset.ice"
