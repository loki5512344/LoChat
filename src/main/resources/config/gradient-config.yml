# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║                          LoChat Gradient Configuration                      ║
# ║                         Конфигурация градиентов                            ║
# ║                              Версия: 1.5.5-1.20.1                          ║
# ╚══════════════════════════════════════════════════════════════════════════════╝

# ┌─────────────────────────────────────────────────────────────────────────────┐
# │                         ОСНОВНЫЕ НАСТРОЙКИ                                 │
# └─────────────────────────────────────────────────────────────────────────────┘

gradient:
  # Тип хранения данных: file, mysql, sqlite
  storage-type: "file"
  
  # Минимальное количество цветов в градиенте
  min-colors: 1
  
  # Максимальное количество цветов в градиенте
  max-colors: 7
  
  # Стоимость за каждый цвет (PlayerPoints)
  price-per-color: 50
  
  # Стоимость префикса
  prefix-price: 500
  
  # Одноразовая покупка префикса (true) или за каждое изменение (false)
  prefix-one-time-purchase: true
  
  # Максимальная длина префикса
  max-prefix-length: 16
  
  # Кулдаун на смену цвета (секунды)
  color-cooldown: 60
  
  # Кулдаун на смену префикса (секунды)
  prefix-cooldown: 120
  
  # Автоматически применять градиент к нику
  auto-apply-gradient: true
  
  # Обновлять отображаемое имя
  update-display-name: true
  
  # Обновлять таб-лист
  update-tab-list: true

# ┌─────────────────────────────────────────────────────────────────────────────┐
# │                            ГОТОВЫЕ ПРЕСЕТЫ                                 │
# └─────────────────────────────────────────────────────────────────────────────┘

presets:
