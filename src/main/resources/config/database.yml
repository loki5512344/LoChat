# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║                          LoChat Database Configuration                     ║
# ║                         Конфигурация базы данных                          ║
# ║                              Версия: 1.5.5-1.20.1                          ║
# ╚══════════════════════════════════════════════════════════════════════════════╝

# ┌─────────────────────────────────────────────────────────────────────────────┐
# │                         ОСНОВНЫЕ НАСТРОЙКИ                                 │
# └─────────────────────────────────────────────────────────────────────────────┘

settings:
  # Тип базы данных: file, sqlite, mysql, postgresql
  type: "file"
  
  # Префикс для таблиц
  table-prefix: "lochat_"
  
  # Автоматически создавать таблицы
  auto-create-tables: true
  
  # Автоматически обновлять структуру таблиц
  auto-update-tables: true
  
  # Кодировка для MySQL
  charset: "utf8mb4"
  
  # Collation для MySQL
  collation: "utf8mb4_unicode_ci"

# ┌─────────────────────────────────────────────────────────────────────────────┐
# │                         ФАЙЛОВОЕ ХРАНЕНИЕ                                  │
# └─────────────────────────────────────────────────────────────────────────────┘

file:
  # Папка для хранения файлов данных
  data-folder: "plugins/LoChat/data/"
  
  # Формат файлов: yaml, json
  format: "yaml"
  
  # Автоматическое сохранение (секунды)
  auto-save-interval: 300
  
  # Создавать резервные копии
  backup:
    enabled: true
    interval: 3600  # Каждый час
    max-backups: 24  # Хранить 24 копии
    folder: "plugins/LoChat/backups/"

# ┌─────────────────────────────────────────────────────────────────────────────┐
# │                         SQLITE                                             │
# └─────────────────────────────────────────────────────────────────────────────┘

sqlite:
  # Путь к файлу базы данных
  file: "plugins/LoChat/database.db"
  
  # Настройки соединения
  connection:
    # Таймаут соединения (миллисекунды)
    timeout: 30000
    
    # Включить WAL режим (Write-Ahead Logging)
    wal-mode: true
    
    # Размер кэша (KB)
    cache-size: 2000
    
    # Синхронизация: OFF, NORMAL, FULL
    synchronous: "NORMAL"

# ┌─────────────────────────────────────────────────────────────────────────────┐
# │                         MYSQL                                              │
# └─────────────────────────────────────────────────────────────────────────────┘

mysql:
  # Хост базы данных
  host: "localhost"
  
  # Порт базы данных
  port: 3306
  
  # Имя базы данных
  database: "lochat"
  
  # Имя пользователя
  username: "root"
  
  # Пароль
  password: "password"
  
  # Дополнительные параметры подключения
  properties:
    useSSL: false
    allowPublicKeyRetrieval: true
    serverTimezone: "UTC"
    characterEncoding: "utf8"
    useUnicode: true
    autoReconnect: true
    failOverReadOnly: false
    maxReconnects: 3
    initialTimeout: 1
  
  # Настройки пула соединений (HikariCP)
  pool:
    # Максимальное количество соединений
    maximum-pool-size: 10
    
    # Минимальное количество простаивающих соединений
    minimum-idle: 2
    
    # Таймаут получения соединения (миллисекунды)
    connection-timeout: 30000
    
    # Время жизни простаивающего соединения (миллисекунды)
    idle-timeout: 600000
    
    # Максимальное время жизни соединения (миллисекунды)
    max-lifetime: 1800000
    
    # Интервал проверки соединений (миллисекунды)
    leak-detection-threshold: 60000

# ┌─────────────────────────────────────────────────────────────────────────────┐
# │                         POSTGRESQL                                         │
# └─────────────────────────────────────────────────────────────────────────────┘

postgresql:
  # Хост базы данных
  host: "localhost"
  
  # Порт базы данных
  port: 5432
  
  # Имя базы данных
  database: "lochat"
  
  # Имя пользователя
  username: "postgres"
  
  # Пароль
  password: "password"
  
  # Схема базы данных
  schema: "public"
  
  # Дополнительные параметры подключения
  properties:
    ssl: false
    sslmode: "disable"
    serverTimezone: "UTC"
    characterEncoding: "utf8"
    autoReconnect: true
  
  # Настройки пула соединений
  pool:
    maximum-pool-size: 10
    minimum-idle: 2
    connection-timeout: 30000
    idle-timeout: 600000
    max-lifetime: 1800000

# ┌─────────────────────────────────────────────────────────────────────────────┐
# │                         СТРУКТУРА ТАБЛИЦ                                   │
# └─────────────────────────────────────────────────────────────────────────────┘

tables:
  # Таблица игроков
  players:
    name: "players"
    columns:
      uuid: "VARCHAR(36) PRIMARY KEY"
      name: "VARCHAR(16) NOT NULL"
      display_name: "TEXT"
      first_join: "BIGINT NOT NULL"
      last_join: "BIGINT NOT NULL"
      last_quit: "BIGINT"
      total_playtime: "BIGINT DEFAULT 0"
      created_at: "TIMESTAMP DEFAULT CURRENT_TIMESTAMP"
      updated_at: "TIMESTAMP DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP"
  
  # Таблица градиентов
  gradients:
    name: "gradients"
    columns:
      uuid: "VARCHAR(36) PRIMARY KEY"
      colors: "TEXT"
      prefix: "TEXT"
      enabled: "BOOLEAN DEFAULT TRUE"
      created_at: "TIMESTAMP DEFAULT CURRENT_TIMESTAMP"
      updated_at: "TIMESTAMP DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP"
  
  # Таблица мутов
  mutes:
    name: "mutes"
    columns:
      id: "INT AUTO_INCREMENT PRIMARY KEY"
      uuid: "VARCHAR(36) NOT NULL"
      moderator_uuid: "VARCHAR(36)"
      reason: "TEXT NOT NULL"
      start_time: "BIGINT NOT NULL"
      end_time: "BIGINT"
      active: "BOOLEAN DEFAULT TRUE"
      silent: "BOOLEAN DEFAULT FALSE"
      created_at: "TIMESTAMP DEFAULT CURRENT_TIMESTAMP"
  
  # История мутов
  mute_history:
    name: "mute_history"
    columns:
      id: "INT AUTO_INCREMENT PRIMARY KEY"
      uuid: "VARCHAR(36) NOT NULL"
      moderator_uuid: "VARCHAR(36)"
      reason: "TEXT NOT NULL"
      duration: "BIGINT NOT NULL"
      start_time: "BIGINT NOT NULL"
      end_time: "BIGINT"
      unmute_reason: "TEXT"
      unmute_moderator: "VARCHAR(36)"
      created_at: "TIMESTAMP DEFAULT CURRENT_TIMESTAMP"
  
  # Таблица игнорирования
  ignores:
    name: "ignores"
    columns:
      id: "INT AUTO_INCREMENT PRIMARY KEY"
      player_uuid: "VARCHAR(36) NOT NULL"
      ignored_uuid: "VARCHAR(36) NOT NULL"
      created_at: "TIMESTAMP DEFAULT CURRENT_TIMESTAMP"
  
  # Таблица сообщений (если включено логирование)
  messages:
    name: "messages"
    columns:
      id: "INT AUTO_INCREMENT PRIMARY KEY"
      uuid: "VARCHAR(36) NOT NULL"
      type: "VARCHAR(20) NOT NULL"
      content: "TEXT NOT NULL"
      server: "VARCHAR(50)"
      world: "VARCHAR(50)"
      created_at: "TIMESTAMP DEFAULT CURRENT_TIMESTAMP"
  
  # Настройки игроков
  player_settings:
    name: "player_settings"
    columns:
      uuid: "VARCHAR(36) PRIMARY KEY"
      sounds_enabled: "BOOLEAN DEFAULT TRUE"
      sound_volume: "FLOAT DEFAULT 1.0"
      auto_messages: "BOOLEAN DEFAULT TRUE"
      mentions_enabled: "BOOLEAN DEFAULT TRUE"
      pm_sounds: "BOOLEAN DEFAULT TRUE"
      created_at: "TIMESTAMP DEFAULT CURRENT_TIMESTAMP"
      updated_at: "TIMESTAMP DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP"

# ┌─────────────────────────────────────────────────────────────────────────────┐
# │                         ИНДЕКСЫ                                            │
# └─────────────────────────────────────────────────────────────────────────────┘

indexes:
  # Индексы для оптимизации запросов
  players:
    - "CREATE INDEX idx_players_name ON {prefix}players(name)"
    - "CREATE INDEX idx_players_last_join ON {prefix}players(last_join)"
  
  mutes:
    - "CREATE INDEX idx_mutes_uuid ON {prefix}mutes(uuid)"
    - "CREATE INDEX idx_mutes_active ON {prefix}mutes(active)"
    - "CREATE INDEX idx_mutes_end_time ON {prefix}mutes(end_time)"
  
  mute_history:
    - "CREATE INDEX idx_mute_history_uuid ON {prefix}mute_history(uuid)"
    - "CREATE INDEX idx_mute_history_moderator ON {prefix}mute_history(moderator_uuid)"
    - "CREATE INDEX idx_mute_history_start_time ON {prefix}mute_history(start_time)"
  
  ignores:
    - "CREATE INDEX idx_ignores_player ON {prefix}ignores(player_uuid)"
    - "CREATE INDEX idx_ignores_ignored ON {prefix}ignores(ignored_uuid)"
    - "CREATE UNIQUE INDEX idx_ignores_unique ON {prefix}ignores(player_uuid, ignored_uuid)"
  
  messages:
    - "CREATE INDEX idx_messages_uuid ON {prefix}messages(uuid)"
    - "CREATE INDEX idx_messages_type ON {prefix}messages(type)"
    - "CREATE INDEX idx_messages_created_at ON {prefix}messages(created_at)"

# ┌─────────────────────────────────────────────────────────────────────────────┐
# │                         ОЧИСТКА ДАННЫХ                                     │
# └─────────────────────────────────────────────────────────────────────────────┘

cleanup:
  # Автоматическая очистка старых данных
  enabled: true
  
  # Интервал очистки (секунды)
  interval: 86400  # Раз в день
  
  # Настройки очистки для каждой таблицы
  tables:
    mute_history:
      # Удалять записи старше N дней
      max-age-days: 90
      # Оставлять минимум записей на игрока
      min-records-per-player: 5
    
    messages:
      max-age-days: 30
      # Максимальное количество записей
      max-records: 100000
    
    players:
      # Удалять неактивных игроков (дни)
      inactive-days: 365
      # Не удалять игроков с определенными данными
      keep-with-data: true

# ┌─────────────────────────────────────────────────────────────────────────────┐
# │                         МИГРАЦИИ                                           │
# └─────────────────────────────────────────────────────────────────────────────┘

migrations:
  # Автоматически выполнять миграции
  auto-migrate: true
  
  # Создавать резервные копии перед миграцией
  backup-before-migrate: true
  
  # Версия схемы базы данных
  schema-version: 1

# ┌─────────────────────────────────────────────────────────────────────────────┐
# │                         ОТЛАДКА                                            │
# └─────────────────────────────────────────────────────────────────────────────┘

debug:
  # Логировать SQL запросы
  log-queries: false
  
  # Логировать медленные запросы (миллисекунды)
  slow-query-threshold: 1000
  
  # Показывать статистику соединений
  show-connection-stats: false
  
  # Интервал вывода статистики (секунды)
  stats-interval: 300