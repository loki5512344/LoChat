# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║                          LoChat Auto Messages                              ║
# ║                           Автосообщения                                   ║
# ║                              Версия: 1.5.5-1.20.1                          ║
# ╚══════════════════════════════════════════════════════════════════════════════╝

# ┌─────────────────────────────────────────────────────────────────────────────┐
# │                         ОСНОВНЫЕ НАСТРОЙКИ                                 │
# └─────────────────────────────────────────────────────────────────────────────┘

settings:
  # Включить автосообщения
  enabled: true
  
  # Интервал между сообщениями (секунды)
  interval: 300
  
  # Случайный порядок сообщений
  random: true
  
  # Минимальное количество игроков для отправки
  min-players: 1
  
  # Префикс для автосообщений
  prefix: "&#00D4FF[Авто]"
  
  # Отправлять в определенные миры
  worlds:
    - "world"
    - "world_nether"
    - "world_the_end"
  
  # Тип отправки: chat, actionbar, title, bossbar
  type: "chat"

# ┌─────────────────────────────────────────────────────────────────────────────┐
# │                            СООБЩЕНИЯ                                       │
# └─────────────────────────────────────────────────────────────────────────────┘

messages:
  welcome:
    enabled: true
    weight: 10  # Вес для случайного выбора (больше = чаще)
    permission: ""  # Пустое = для всех
    worlds: []  # Пустое = во всех мирах
    content:
      - "&#FFD700Добро пожаловать на наш сервер!"
      - "&#87CEEBИспользуйте /help для получения помощи"
      - "&#6BCB77Приятной игры!"
  
  rules:
    enabled: true
    weight: 8
    permission: ""
    worlds: []
    content:
      - "&#FF6B6BСоблюдайте правила сервера!"
      - "&#87CEEBПодробнее: /rules"
      - "&#FFA726Нарушения караются мутом или баном"
  
  discord:
    enabled: true
    weight: 7
    permission: ""
    worlds: []
    content:
      - "&#7289DAПрисоединяйтесь к нашему Discord!"
      - "&#87CEEBСсылка: discord.gg/example"
      - "&#6BCB77Общайтесь с игроками вне игры!"
  
  website:
    enabled: true
    weight: 6
    permission: ""
    worlds: []
    content:
      - "&#00FF88Посетите наш сайт!"
      - "&#87CEEBАдрес: example.com"
      - "&#6BCB77Карта сервера, статистика и многое другое!"
  
  donate:
    enabled: true
    weight: 5
    permission: ""
    worlds: []
    content:
      - "&#FFD700Поддержите сервер донатом!"
      - "&#87CEEBПолучите VIP статус и привилегии"
      - "&#6BCB77Подробнее: /donate"
  
  tips:
    enabled: true
    weight: 9
    permission: ""
    worlds: []
    content:
      - "&#87CEEB💡 Совет: Используйте /coords для просмотра координат"
      - "&#87CEEB💡 Совет: /ignore <игрок> - игнорировать игрока"
      - "&#87CEEB💡 Совет: /msg <игрок> <сообщение> - личное сообщение"
      - "&#87CEEB💡 Совет: /reply <сообщение> - ответить на ЛС"
      - "&#87CEEB💡 Совет: /color <цвет> - изменить цвет ника"
  
  events:
    enabled: false
    weight: 3
    permission: ""
    worlds: []
    content:
      - "&#FF69B4🎉 Скоро событие на сервере!"
      - "&#87CEEBСледите за новостями в Discord"
      - "&#6BCB77Участвуйте и получайте призы!"
  
  economy:
    enabled: false
    weight: 4
    permission: ""
    worlds: []
    content:
      - "&#FFD700💰 Зарабатывайте деньги на сервере!"
      - "&#87CEEBПродавайте ресурсы в магазине"
      - "&#6BCB77Команды: /shop, /sell, /balance"
  
  pvp:
    enabled: false
    weight: 2
    permission: ""
    worlds: ["world_pvp"]
    content:
      - "&#FF6B6B⚔️ Вы в PvP зоне!"
      - "&#FFA726Будьте осторожны с другими игроками"
      - "&#87CEEBИспользуйте /spawn для выхода"

# ┌─────────────────────────────────────────────────────────────────────────────┐
# │                         СПЕЦИАЛЬНЫЕ СООБЩЕНИЯ                              │
# └─────────────────────────────────────────────────────────────────────────────┘

special:
  # Сообщения для новичков (первый вход)
  newbie:
    enabled: true
    delay: 30  # Задержка после входа (секунды)
    content:
      - "&#6BCB77Добро пожаловать на сервер, {player}!"
      - "&#87CEEBЭто ваш первый визит. Изучите /help"
      - "&#FFD700Желаем приятной игры!"
  
  # Сообщения при входе
  join:
    enabled: false
    delay: 5
    content:
      - "&#6BCB77С возвращением, {player}!"
      - "&#87CEEBНе забудьте проверить новости: /news"
  
  # Сообщения при достижениях
  achievement:
    enabled: false
    content:
      - "&#FFD700🏆 Поздравляем с достижением!"
      - "&#87CEEBПродолжайте исследовать мир"

# ┌─────────────────────────────────────────────────────────────────────────────┐
# │                         НАСТРОЙКИ ОТОБРАЖЕНИЯ                              │
# └─────────────────────────────────────────────────────────────────────────────┘

display:
  # Настройки для title сообщений
  title:
    fade-in: 10
    stay: 40
    fade-out: 10
    title: "&#FFD700Информация"
    subtitle: "{message}"
  
  # Настройки для actionbar сообщений
  actionbar:
    duration: 60  # Время показа (тики)
  
  # Настройки для bossbar сообщений
  bossbar:
    color: "BLUE"  # BLUE, GREEN, PINK, PURPLE, RED, WHITE, YELLOW
    style: "SOLID"  # SOLID, SEGMENTED_6, SEGMENTED_10, SEGMENTED_12, SEGMENTED_20
    duration: 100  # Время показа (тики)
  
  # Звуковые эффекты
  sound:
    enabled: false
    type: "BLOCK_NOTE_BLOCK_PLING"
    volume: 0.5
    pitch: 1.0

# ┌─────────────────────────────────────────────────────────────────────────────┐
# │                         УСЛОВИЯ ОТПРАВКИ                                   │
# └─────────────────────────────────────────────────────────────────────────────┘

conditions:
  # Время суток (24-часовой формат)
  time:
    enabled: false
    start: "09:00"
    end: "23:00"
  
  # Дни недели (1-7, где 1 = понедельник)
  days:
    enabled: false
    allowed: [1, 2, 3, 4, 5, 6, 7]
  
  # Исключить игроков в AFK
  exclude-afk: false
  
  # Исключить игроков в творческом режиме
  exclude-creative: false
  
  # Исключить игроков с определенными правами
  exclude-permissions:
    - "lochat.automessage.ignore"

# ┌─────────────────────────────────────────────────────────────────────────────┐
# │                         ПЕРСОНАЛИЗАЦИЯ                                     │
# └─────────────────────────────────────────────────────────────────────────────┘

personalization:
  # Использовать имя игрока в сообщениях
  use-player-name: true
  
  # Адаптировать сообщения под группу игрока
  group-specific: false
  
  # Сообщения для разных групп
  groups:
    vip:
      prefix: "&#FFD700[VIP Авто]"
      messages:
        - "&#FFD700Спасибо за поддержку сервера, {player}!"
        - "&#87CEEBВы получаете эксклюзивные привилегии"
    
    newbie:
      prefix: "&#6BCB77[Помощь]"
      messages:
        - "&#6BCB77Нужна помощь, {player}? Спросите в чате!"
        - "&#87CEEBИспользуйте /help для списка команд"

# ┌─────────────────────────────────────────────────────────────────────────────┐
# │                         СТАТИСТИКА                                         │
# └─────────────────────────────────────────────────────────────────────────────┘

statistics:
  # Вести статистику отправленных сообщений
  enabled: true
  
  # Файл для сохранения статистики
  file: "plugins/LoChat/automessage-stats.yml"
  
  # Сбрасывать статистику каждый месяц
  reset-monthly: true