# Примеры использования голов игроков:
# :head_Steve: - показать голову игрока Steve
# @head Notch - показать интерактивную голову игрока Notch
# 
# Требуется право: lochat.heademoji.use

head_examples:
  usage: |
    <gradient:#9370DB:#8A2BE2>═══════ Головы игроков ═══════</gradient>
    <gradient:#87CEEB:#4682B4>:head_nickname:</gradient> <gray>- показать голову игрока</gray>
    <gradient:#87CEEB:#4682B4>@head nickname</gradient> <gray>- интерактивная голова</gray>
    
    <gray>Требуется право:</gray> <white>lochat.heademoji.use</white>