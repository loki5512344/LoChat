#file: noinspection YAMLDuplicatedKeys,YAMLDuplicatedKeys
# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║                         LoChat Gradient Messages                            ║
# ║                      Сообщения градиентного модуля                         ║
# ║                              Версия: 1.5.5-1.20.1                          ║
# ╚══════════════════════════════════════════════════════════════════════════════╝

# ┌─────────────────────────────────────────────────────────────────────────────┐
# │                            ОСНОВНЫЕ СООБЩЕНИЯ                              │
# └─────────────────────────────────────────────────────────────────────────────┘

# Префикс градиентного модуля
prefix: "&#9370DB[&#9370DBG&#8E6CD9r&#896AD7a&#8467D5d&#7F65D3i&#7A62D1e&#7560CFn&#705DCDt&#6B5BCB]"

# ┌─────────────────────────────────────────────────────────────────────────────┐
# │                            КОМАНДА /color                                  │
# └─────────────────────────────────────────────────────────────────────────────┘

color:
  # Успешные действия
  set: "<gradient:#6BCB77:#4ECDC4>Градиент установлен!</gradient>"
  enabled: "<gradient:#6BCB77:#4ECDC4>Градиентный ник включен</gradient>"
  disabled: "<gradient:#FF6B6B:#FF4757>Градиентный ник отключен</gradient>"
  reset: "<gradient:#FFA726:#FF9800>Градиент сброшен</gradient>"
  copied: "<gradient:#6BCB77:#4ECDC4>Градиент скопирован с игрока {player}</gradient>"
  
  # Ошибки
  invalid-hex: "<gradient:#FF6B6B:#FF4757>Неверный HEX цвет: {color}</gradient>"
  too-many-colors: "<gradient:#FF6B6B:#FF4757>Слишком много цветов! Максимум: {max}</gradient>"
  too-few-colors: "<gradient:#FF6B6B:#FF4757>Слишком мало цветов! Минимум: {min}</gradient>"
  no-permission: "<gradient:#FF6B6B:#FF4757>Нет прав на использование градиентов</gradient>"
  cooldown: "<gradient:#FFA726:#FF9800>Подождите {time} сек перед изменением цвета</gradient>"
  not-enough-points: "<gradient:#FF6B6B:#FF4757>Недостаточно поинтов! Нужно: {price}, у вас: {balance}</gradient>"
  player-not-found: "<gradient:#FF6B6B:#FF4757>Игрок не найден</gradient>"
  no-gradient: "<gradient:#FFA726:#FF9800>У игрока нет градиента для копирования</gradient>"
  
  # Помощь
  help:
    - "<gradient:#FFD700:#FFA500>═══════ Команды градиента ═══════</gradient>"
    - "<gradient:#87CEEB:#4682B4>/color <hex1> [hex2] ...</gradient> <gray>- установить градиент</gray>"
    - "<gradient:#87CEEB:#4682B4>/color on/off</gradient> <gray>- включить/выключить градиент</gray>"
    - "<gradient:#87CEEB:#4682B4>/color reset</gradient> <gray>- сбросить градиент</gray>"
    - "<gradient:#87CEEB:#4682B4>/color copy <игрок></gradient> <gray>- скопировать градиент</gray>"
    - "<gradient:#87CEEB:#4682B4>/color preset <название></gradient> <gray>- использовать предустановку</gray>"
    - ""
    - "<gradient:#FFA726:#FF9800>Предустановки:</gradient> <white>fire, ocean, forest, sunset, rainbow, ice, gold, purple, pink, green</white>"

# ┌─────────────────────────────────────────────────────────────────────────────┐
# │                            КОМАНДА /prefix                                 │
# └─────────────────────────────────────────────────────────────────────────────┘

prefix:
  # Успешные действия
  set: "<gradient:#6BCB77:#4ECDC4>Префикс установлен!</gradient>"
  enabled: "<gradient:#6BCB77:#4ECDC4>Префикс включен</gradient>"
  disabled: "<gradient:#FF6B6B:#FF4757>Префикс отключен</gradient>"
  reset: "<gradient:#FFA726:#FF9800>Префикс сброшен</gradient>"
  
  # Ошибки
  too-long: "<gradient:#FF6B6B:#FF4757>Префикс слишком длинный! Максимум: {max} символов</gradient>"
  no-permission: "<gradient:#FF6B6B:#FF4757>Нет прав на использование префиксов</gradient>"
  cooldown: "<gradient:#FFA726:#FF9800>Подождите {time} сек перед изменением префикса</gradient>"
  not-enough-points: "<gradient:#FF6B6B:#FF4757>Недостаточно поинтов! Нужно: {price}, у вас: {balance}</gradient>"
  
  # Помощь
  help:
    - "<gradient:#FFD700:#FFA500>═══════ Команды префикса ═══════</gradient>"
    - "<gradient:#87CEEB:#4682B4>/prefix <текст></gradient> <gray>- установить префикс</gray>"
    - "<gradient:#87CEEB:#4682B4>/prefix on/off</gradient> <gray>- включить/выключить префикс</gray>"
    - "<gradient:#87CEEB:#4682B4>/prefix reset</gradient> <gray>- сбросить префикс</gray>"

# ┌─────────────────────────────────────────────────────────────────────────────┐
# │                          АДМИНСКИЕ КОМАНДЫ                                 │
# └─────────────────────────────────────────────────────────────────────────────┘

admin:
  # Успешные действия
  reloaded: "<gradient:#6BCB77:#4ECDC4>Конфигурация градиентов перезагружена</gradient>"
  color-set: "<gradient:#6BCB77:#4ECDC4>Градиент установлен игроку {player}</gradient>"
  prefix-set: "<gradient:#6BCB77:#4ECDC4>Префикс установлен игроку {player}</gradient>"
  color-enabled: "<gradient:#6BCB77:#4ECDC4>Градиент включен для {player}</gradient>"
  color-disabled: "<gradient:#FF6B6B:#FF4757>Градиент отключен для {player}</gradient>"
  prefix-enabled: "<gradient:#6BCB77:#4ECDC4>Префикс включен для {player}</gradient>"
  prefix-disabled: "<gradient:#FF6B6B:#FF4757>Префикс отключен для {player}</gradient>"
  color-reset: "<gradient:#FFA726:#FF9800>Градиент сброшен для {player}</gradient>"
  prefix-reset: "<gradient:#FFA726:#FF9800>Префикс сброшен для {player}</gradient>"
  updated-all: "<gradient:#6BCB77:#4ECDC4>Обновлены все игроки ({count})</gradient>"
  
  # Информация об игроке
  info:
    - "<gradient:#FFD700:#FFA500>═══════ Информация о {player} ═══════</gradient>"
    - "<gradient:#87CEEB:#4682B4>Градиент:</gradient> <white>{gradient_status}</white>"
    - "<gradient:#87CEEB:#4682B4>Цвета:</gradient> <white>{colors}</white>"
    - "<gradient:#87CEEB:#4682B4>Префикс:</gradient> <white>{prefix_status}</white>"
    - "<gradient:#87CEEB:#4682B4>Текст префикса:</gradient> <white>{prefix_text}</white>"
    - "<gradient:#87CEEB:#4682B4>Отображаемое имя:</gradient> {display_name}"
  
  # Ошибки
  player-not-found: "<gradient:#FF6B6B:#FF4757>Игрок не найден</gradient>"
  invalid-hex: "<gradient:#FF6B6B:#FF4757>Неверный HEX цвет: {color}</gradient>"
  
  # Помощь
  help:
    - "<gradient:#FFD700:#FFA500>═══════ Админские команды ═══════</gradient>"
    - "<gradient:#87CEEB:#4682B4>/aprefix reload</gradient> <gray>- перезагрузить конфиг</gray>"
    - "<gradient:#87CEEB:#4682B4>/aprefix info <игрок></gradient> <gray>- информация об игроке</gray>"
    - "<gradient:#87CEEB:#4682B4>/aprefix setcolor <игрок> <цвета></gradient> <gray>- установить градиент</gray>"
    - "<gradient:#87CEEB:#4682B4>/aprefix setprefix <игрок> <текст></gradient> <gray>- установить префикс</gray>"
    - "<gradient:#87CEEB:#4682B4>/aprefix coloron/coloroff <игрок></gradient> <gray>- вкл/выкл градиент</gray>"
    - "<gradient:#87CEEB:#4682B4>/aprefix prefixon/prefixoff <игрок></gradient> <gray>- вкл/выкл префикс</gray>"
    - "<gradient:#87CEEB:#4682B4>/aprefix resetcolor <игрок></gradient> <gray>- сбросить градиент</gray>"
    - "<gradient:#87CEEB:#4682B4>/aprefix resetprefix <игрок></gradient> <gray>- сбросить префикс</gray>"
    - "<gradient:#87CEEB:#4682B4>/aprefix updateall</gradient> <gray>- обновить всех игроков</gray>"

# ┌─────────────────────────────────────────────────────────────────────────────┐
# │                              GUI СООБЩЕНИЯ                                 │
# └─────────────────────────────────────────────────────────────────────────────┘

gui:
  # Заголовки
  confirm-title: "<gradient:#FFD700:#FFA500>Подтверждение покупки</gradient>"
  
  # Кнопки
  confirm-button: "<gradient:#6BCB77:#4ECDC4>✓ Подтвердить покупку</gradient>"
  cancel-button: "<gradient:#FF6B6B:#FF4757>✗ Отменить</gradient>"
  
  # Описания
  confirm-lore:
    - "<gray>Цена: <yellow>{price} поинтов</yellow>"
    - "<gray>Цвета: <white>{colors}</white>"
    - ""
    - "<gray>Ваш баланс: <yellow>{balance}</yellow>"
    - ""
    - "<gradient:#6BCB77:#4ECDC4>Нажмите для подтверждения</gradient>"
  
  cancel-lore:
    - "<gradient:#FF6B6B:#FF4757>Нажмите для отмены</gradient>"
  
  # Результаты
  purchase-success: "<gradient:#6BCB77:#4ECDC4>Градиент успешно куплен!</gradient>"
  purchase-cancelled: "<gradient:#FFA726:#FF9800>Покупка отменена</gradient>"

# ┌─────────────────────────────────────────────────────────────────────────────┐
# │                              ОБЩИЕ СООБЩЕНИЯ                               │
# └─────────────────────────────────────────────────────────────────────────────┘

general:
  # Статусы
  enabled: "<gradient:#6BCB77:#4ECDC4>Включено</gradient>"
  disabled: "<gradient:#FF6B6B:#FF4757>Отключено</gradient>"
  none: "<gray>Нет</gray>"
  
  # Единицы времени
  seconds: "сек"
  minutes: "мин"
  hours: "ч"
  days: "д"