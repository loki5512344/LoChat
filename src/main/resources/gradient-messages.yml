# Цвета
color-help: |
  §e=== Команда /color ===
  §e/color <цвет1> [цвет2] ... §7— установить градиент
  §e/color on §7— включить цвет
  §e/color off §7— выключить цвет
  §e/color reset §7— сбросить цвет
  §e/color copy <игрок> §7— скопировать цвет
  §7Пример: /color #FF0000 #00FF00 #0000FF
