# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║                              LoChat Configuration                            ║
# ║                     Продвинутый чат-плагин для Paper                        ║
# ║                              Версия: 1.5.5-1.20.1                          ║
# ║                                Автор: loki                                  ║
# ╚══════════════════════════════════════════════════════════════════════════════╝

config-version: 3

# ┌─────────────────────────────────────────────────────────────────────────────┐
# │                            ОСНОВНЫЕ НАСТРОЙКИ                               │
# └─────────────────────────────────────────────────────────────────────────────┘

# Префикс плагина в сообщениях
prefix: "<gradient:#00D4FF:#0099CC>[LoChat]</gradient>"

# ┌─────────────────────────────────────────────────────────────────────────────┐
# │                              НАСТРОЙКИ ЧАТА                                │
# └─────────────────────────────────────────────────────────────────────────────┘

chat:
  # ═══════════════════════════════════════════════════════════════════════════
  #                            ГЛОБАЛЬНЫЙ ЧАТ
  # ═══════════════════════════════════════════════════════════════════════════
  global:
    # Включить глобальный чат
    enabled: true
    # Символ для отправки в глобальный чат
    symbol: "!"
    # Кулдаун между сообщениями (секунды)
    cooldown: 3
    # Префикс глобального чата
    prefix: "<gradient:#FFD700:#FFA500>[G]</gradient>"
    # Формат сообщения: {prefix} {player} {message}
    format: "{prefix} <gradient:#00FF88:#00CC66>{player}</gradient><dark_gray>:</dark_gray> {message}"

  # ═══════════════════════════════════════════════════════════════════════════
  #                            ЛОКАЛЬНЫЙ ЧАТ
  # ═══════════════════════════════════════════════════════════════════════════
  local:
    # Включить локальный чат
    enabled: true
    # Радиус локального чата (блоки)
    radius: 100
    # Кулдаун между сообщениями (секунды)
    cooldown: 1
    # Префикс локального чата
    prefix: "<gradient:#87CEEB:#4682B4>[L]</gradient>"
    # Формат сообщения
    format: "{prefix} <gradient:#00FF88:#00CC66>{player}</gradient><dark_gray>:</dark_gray> {message}"

  # ═══════════════════════════════════════════════════════════════════════════
  #                            ЛИЧНЫЕ СООБЩЕНИЯ
  # ═══════════════════════════════════════════════════════════════════════════
  pm:
    # Включить личные сообщения
    enabled: true
    # Кулдаун между PM (секунды)
    cooldown: 2
    # Логировать PM в консоль
    log: false
    # Звук при получении PM
    sound: true
    sound-type: "BLOCK_NOTE_BLOCK_PLING"

# ┌─────────────────────────────────────────────────────────────────────────────┐
# │                            ГРАДИЕНТНЫЕ НИКИ                                │
# └─────────────────────────────────────────────────────────────────────────────┘

# Интеграция с градиентным модулем (встроенный LoPreff)
lopreff:
  # Включить градиентные ники
  enabled: true
  # Использовать градиентный ник в чате
  use-gradient-name: true
  # Использовать кастомный префикс
  use-custom-prefix: true

# Настройки отображения ника
display:
  # Обновлять display name игрока (показывает префикс+ник над головой)
  update-display-name: true
  # Обновлять tab list
  update-tab-list: true

# ┌─────────────────────────────────────────────────────────────────────────────┐
# │                                УПОМИНАНИЯ                                   │
# └─────────────────────────────────────────────────────────────────────────────┘

mentions:
  # Включить систему упоминаний (@nickname)
  enabled: true
  # Воспроизводить звук при упоминании
  sound: true
  # Тип звука
  sound-type: "BLOCK_NOTE_BLOCK_PLING"
  # Подсветка упоминания в чате
  highlight: "<gradient:#FFFF00:#FFD700>@{player}</gradient>"
  # Подсветка собственного ника
  self-highlight: "<gradient:#FFD700:#FFA500>{player}</gradient>"
# ┌─────────────────────────────────────────────────────────────────────────────┐
# │                            АВТОСООБЩЕНИЯ                                   │
# └─────────────────────────────────────────────────────────────────────────────┘

automessages:
  # Включить автосообщения
  enabled: true
  # Интервал между сообщениями (секунды)
  interval: 300
  # Случайный порядок сообщений
  random: false

# ┌─────────────────────────────────────────────────────────────────────────────┐
# │                              ОБЪЯВЛЕНИЯ                                    │
# └─────────────────────────────────────────────────────────────────────────────┘

announcements:
  # Показывать title при объявлении
  show-title: true
  # Заголовок title
  title-header: "<gradient:#FF6B6B:#FF4757>ОБЪЯВЛЕНИЕ</gradient>"
  # Показывать actionbar при объявлении  
  show-actionbar: true
  # Время показа title (в секундах)
  title-duration: 3

# Формат объявления
formats:
  announcement: "<gradient:#FF6B6B:#FF4757>[ОБЪЯВЛЕНИЕ]</gradient> <message>"

# ┌─────────────────────────────────────────────────────────────────────────────┐
# │                            ОЧИСТКА ЧАТА                                    │
# └─────────────────────────────────────────────────────────────────────────────┘

clearchat:
  message:
    # Показывать сообщение после очистки чата
    enabled: true
    # Текст сообщения ({player} - имя администратора)
    text: "<gradient:#FF6B6B:#FF4757>Чат очищен администратором {player}</gradient>"

# ┌─────────────────────────────────────────────────────────────────────────────┐
# │                            ГОЛОВЫ ИГРОКОВ                                  │
# └─────────────────────────────────────────────────────────────────────────────┘

head-emoji:
  # Включить функцию голов игроков
  enabled: true
  # Разрешить использование @head команд
  allow-player-heads: true
  # Максимальное количество голов в одном сообщении
  max-heads-per-message: 3

# ┌─────────────────────────────────────────────────────────────────────────────┐
# │                              СИСТЕМА МУТОВ                                 │
# └─────────────────────────────────────────────────────────────────────────────┘

mute:
  # Сообщения с плейсхолдерами:
  # %duration% - время мута
  # %reason% - причина
  # %player% - замученный игрок
  # %operator% - модератор
  
  messages:
    # Сообщение при муте (broadcast)
    muted: "<gradient:#FF6B6B:#FF4757>%player%</gradient> <gray>был замучен на</gray> <gradient:#FF6B6B:#FF4757>%duration%</gradient> <gray>модератором</gray> <gradient:#FF6B6B:#FF4757>%operator%</gradient><gray>. Причина:</gray> <gradient:#FF6B6B:#FF4757>%reason%</gradient>"
    # Сообщение при размуте (broadcast)
    unmuted: "<gradient:#6BCB77:#4ECDC4>%player%</gradient> <gray>был размучен модератором</gray> <gradient:#6BCB77:#4ECDC4>%operator%</gradient>"
    # Сообщение замученному игроку
    you-muted: "<gradient:#FF6B6B:#FF4757>Вы замучены на %duration%! Причина: %reason%</gradient>"
    # Сообщение при перманентном муте
    you-muted-permanent: "<gradient:#FF6B6B:#FF4757>Вы замучены навсегда! Причина: %reason%</gradient>"
    # Сообщение при попытке написать в чат
    cannot-chat: "<gradient:#FF6B6B:#FF4757>Вы замучены! Осталось: %duration%</gradient>"
    cannot-chat-permanent: "<gradient:#FF6B6B:#FF4757>Вы замучены навсегда!</gradient>"
    # Тихий мут (только для тех кто видит)
    silent-muted: "<gray>[Тихо]</gray> <gradient:#FF6B6B:#FF4757>%player%</gradient> <gray>замучен на</gray> <gradient:#FF6B6B:#FF4757>%duration%</gradient> <gray>(%operator%). Причина: %reason%</gray>"
    silent-unmuted: "<gray>[Тихо]</gray> <gradient:#6BCB77:#4ECDC4>%player%</gradient> <gray>размучен (%operator%)</gray>"
  
  # Причина по умолчанию если не указана
  default-reason: "Нарушение правил"
  
  # Максимальное время мута по умолчанию (если не указано время)
  default-duration: "7d"
  
  # Доступные длительности для прав lochat.mute.dur.<время>
  durations:
    - "10m"
    - "30m"
    - "1h"
    - "6h"
    - "12h"
    - "1d"
    - "3d"
    - "7d"
    - "14d"
    - "30d"
    - "perm"