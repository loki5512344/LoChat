# LoChat Configuration
# Author: loki
# Config Version: 2

config-version: 2

chat:
  global:
    enabled: true
    prefix: "[G]"
    format: "<prefix><player>: <message>"
    symbol: "!"
    cooldown: 3

  local:
    enabled: true
    radius: 100
    prefix: "[L]"
    format: "<player>: <message>"
    cooldown: 1

  pm:
    enabled: true
    log: false
    sound: true
    sound-type: "ENTITY_EXPERIENCE_ORB_PICKUP"

# Интеграция с GradientNick (LoPreff)
# Использует PlaceholderAPI плейсхолдеры
lopreff:
  enabled: true
  # Использовать градиентный ник в чате
  use-gradient-name: true
  # Использовать кастомный префикс
  use-custom-prefix: true

# Упоминания @ник
mentions:
  enabled: true
  sound: true
  sound-type: "BLOCK_NOTE_BLOCK_PLING"
  # Выделение при @ник
  highlight: "<#04CADF>@{player}</#04CADF>"
  # Выделение когда твой ник написали (без @)
  self-highlight: "<#04CADF>{player}</#04CADF>"

# Фильтр мата
filter:
  enabled: true
  # Регулярные выражения для обнаружения мата с обходами
  patterns:
    # Основные корни с вариациями
    - "х\\s*у\\s*[йяёе]"           # хуй, хуя, хуё, хуе
    - "[хx]\\s*у\\s*[йяёе]"        # латиница: xuй
    - "п\\s*[иi]\\s*з\\s*д"        # пизд, пiзд
    - "п\\s*[иi]\\s*д\\s*[оа]\\s*р" # пидор, пидар
    - "[еeё]\\s*б\\s*[аоуыи]"      # ебать, ебут, ебал
    - "б\\s*л\\s*я\\s*[тдь]"       # блять, блядь
    - "с\\s*у\\s*к\\s*[аи]"        # сука, суки
    - "м\\s*у\\s*д\\s*[аи]"        # муда, муди
    - "г\\s*а\\s*н\\s*д\\s*о\\s*н" # гандон
    - "д\\s*р\\s*о\\s*ч"           # дрочить
    - "с\\s*с\\s*а\\s*т\\s*ь"      # ссать
    - "с\\s*р\\s*а\\s*т\\s*ь"      # срать
    - "ш\\s*м\\s*а\\s*р\\s*[аи]"   # шмара
    - "ч\\s*м\\s*[оы]"             # чмо, чмы
    - "г\\s*н\\s*и\\s*д\\s*[аы]"   # гнида
  
  # Простые слова (для быстрой проверки)
  words:
    # Основные
    - "хуй"
    - "хуя" 
    - "хуё"
    - "хуе"
    - "хуёк"
    - "хуёчек"
    - "хуесос"
    - "хуеплёт"
    - "пизда"
    - "пизде"
    - "пизду"
    - "пиздец"
    - "пиздюк"
    - "пиздюшка"
    - "пиздануть"
    - "спиздить"
    - "пиздоглазый"
    - "ебать"
    - "ебал"
    - "ебут"
    - "ебись"
    - "ебитесь"
    - "ебашить"
    - "уёбывать"
    - "заёбывать"
    - "ебашка"
    - "ебанарот"
    - "блять"
    - "блядь"
    - "блядина"
    - "сука"
    - "суки"
    - "сучка"
    - "мудак"
    - "мудила"
    - "мудачок"
    - "гандон"
    - "гандоник"
    - "пидор"
    - "пидорас"
    - "дрочить"
    - "дрочка"
    - "онанист"
    - "ссать"
    - "срать"
    - "говно"
    - "говнюк"
    - "шмара"
    - "шлюха"
    - "проститутка"
    - "чмо"
    - "чмошник"
    - "чмырь"
    - "гнида"
    - "тварь"
    - "падла"
    - "сволочь"
    - "охуеть"
    - "ахуеть"
    - "нихуя"
    - "кончепизд"
    
    # Обходы с символами
    - "х*й"
    - "п@зда"
    - "б#ять"
    - "хуй"
    - "ebat"
    - "pidar"
    - "mudak"
    
  action: "censor"  # censor/block/warn
  replacement: "***"

# Анти-спам
antispam:
  enabled: true
  max-caps-percent: 70
  max-repeat-chars: 5
  similar-message-delay: 30

automessages:
  enabled: true
  interval: 300
  random: false

formats:
  announcement: "<#04CADF>[ОБЪЯВЛЕНИЕ]</#04CADF> <message>"

# Настройки объявлений
announcements:
  # Показывать title при объявлении
  show-title: true
  # Заголовок title
  title-header: "<#04CADF>ОБЪЯВЛЕНИЕ</#04CADF>"
  # Показывать actionbar при объявлении  
  show-actionbar: true
  # Время показа title (в секундах)
  title-duration: 3
