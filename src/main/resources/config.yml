# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║                              LoChat Configuration                            ║
# ║                     Продвинутый чат-плагин для Paper                        ║
# ║                              Версия: 1.5.5-1.20.1                          ║
# ║                                Автор: loki                                  ║
# ╚══════════════════════════════════════════════════════════════════════════════╝

config-version: 3

# ┌─────────────────────────────────────────────────────────────────────────────┐
# │                            ОСНОВНЫЕ НАСТРОЙКИ                               │
# └─────────────────────────────────────────────────────────────────────────────┘

# Префикс плагина в сообщениях
prefix: "&#00D4FF[&#00D4FFL&#00CAF7o&#00C0EEC&#00B7E6h&#00ADDDa&#00A3D5t&#0099CC]"

# ┌─────────────────────────────────────────────────────────────────────────────┐
# │                              НАСТРОЙКИ ЧАТА                                │
# └─────────────────────────────────────────────────────────────────────────────┘

chat:
  # ═══════════════════════════════════════════════════════════════════════════
  #                            ГЛОБАЛЬНЫЙ ЧАТ
  # ═══════════════════════════════════════════════════════════════════════════
  global:
    # Включить глобальный чат
    enabled: true
    # Символ для отправки в глобальный чат
    symbol: "!"
    # Кулдаун между сообщениями (секунды)
    cooldown: 3
    # Префикс глобального чата
    prefix: "&#FFD700[G]"
    format: "{prefix} &#00FF88{player}&#555555: {message}"

  # ═══════════════════════════════════════════════════════════════════════════
  #                            ЛОКАЛЬНЫЙ ЧАТ
  # ═══════════════════════════════════════════════════════════════════════════
  local:
    # Включить локальный чат
    enabled: true
    # Радиус локального чата (блоки)
    radius: 100
    # Кулдаун между сообщениями (секунды)
    cooldown: 1
    # Префикс локального чата
    prefix: "&#87CEEB[L]"
    format: "{prefix} &#00FF88{player}&#555555: {message}"

  # ═══════════════════════════════════════════════════════════════════════════
  #                            ЛИЧНЫЕ СООБЩЕНИЯ
  # ═══════════════════════════════════════════════════════════════════════════
  pm:
    # Включить личные сообщения
    enabled: true
    # Кулдаун между PM (секунды)
    cooldown: 2
    # Логировать PM в консоль
    log: false
    # Звук при получении PM
    sound: true
    sound-type: "BLOCK_NOTE_BLOCK_PLING"

  # ═══════════════════════════════════════════════════════════════════════════
  #                         HOVER TOOLTIP (наведение на ник)
  # ═══════════════════════════════════════════════════════════════════════════
  hover:
    # Включить hover tooltip при наведении на ник
    enabled: true
    # Формат tooltip (список строк)
    # Плейсхолдеры: {player}, {world}, {ping}, {gamemode}, {health}, {food}
    # Поддержка PlaceholderAPI: %placeholder%
    format:
      - "<gray>Игрок: <white>{player}"
      - "<gray>Мир: <green>{world}"
      - "<gray>Пинг: <yellow>{ping}ms"
      - ""
      - "<yellow>▶ Клик: написать ЛС"

# ┌─────────────────────────────────────────────────────────────────────────────┐
# │                            ГРАДИЕНТНЫЕ НИКИ                                │
# └─────────────────────────────────────────────────────────────────────────────┘

# Интеграция с градиентным модулем (встроенный LoPreff)
lopreff:
  # Включить градиентные ники
  enabled: true
  # Использовать градиентный ник в чате
  use-gradient-name: true
  # Использовать кастомный префикс
  use-custom-prefix: true

# Настройки отображения ника
display:
  # Обновлять display name игрока (показывает префикс+ник над головой)
  update-display-name: true
  # Обновлять tab list
  update-tab-list: true

# ┌─────────────────────────────────────────────────────────────────────────────┐
# │                                УПОМИНАНИЯ                                   │
# └─────────────────────────────────────────────────────────────────────────────┘

mentions:
  # Включить систему упоминаний (@nickname)
  enabled: true
  # Воспроизводить звук при упоминании
  sound: true
  # Тип звука
  sound-type: "BLOCK_NOTE_BLOCK_PLING"
  # Подсветка упоминания в чате
  highlight: "&#FFFF00@{player}"
  self-highlight: "&#FFD700{player}"
# ┌─────────────────────────────────────────────────────────────────────────────┐
# │                            АВТОСООБЩЕНИЯ                                   │
# └─────────────────────────────────────────────────────────────────────────────┘

automessages:
  # Включить автосообщения
  enabled: true
  # Интервал между сообщениями (секунды)
  interval: 300
  # Случайный порядок сообщений
  random: false

# ┌─────────────────────────────────────────────────────────────────────────────┐
# │                              ОБЪЯВЛЕНИЯ                                    │
# └─────────────────────────────────────────────────────────────────────────────┘

announcements:
  # Показывать title при объявлении
  show-title: true
  # Заголовок title
  title-header: "&#FF6B6BОБЪЯВЛЕНИЕ"
  # Показывать actionbar при объявлении  
  show-actionbar: true
  # Время показа title (в секундах)
  title-duration: 3

# Формат объявления
formats:
  announcement: "&#FF6B6B[ОБЪЯВЛЕНИЕ] <message>"

# ┌─────────────────────────────────────────────────────────────────────────────┐
# │                            ОЧИСТКА ЧАТА                                    │
# └─────────────────────────────────────────────────────────────────────────────┘

clearchat:
  message:
    # Показывать сообщение после очистки чата
    enabled: true
    # Текст сообщения ({player} - имя администратора)
    text: "&#FF6B6BЧат очищен администратором {player}"

# ┌─────────────────────────────────────────────────────────────────────────────┐
# │                            ГОЛОВЫ ИГРОКОВ                                  │
# └─────────────────────────────────────────────────────────────────────────────┘

head-emoji:
  # Включить функцию голов игроков
  enabled: true
  # Разрешить использование @head команд
  allow-player-heads: true
  # Максимальное количество голов в одном сообщении
  max-heads-per-message: 3

# ┌─────────────────────────────────────────────────────────────────────────────┐
# │                              СИСТЕМА МУТОВ                                 │
# └─────────────────────────────────────────────────────────────────────────────┘

mute:
  # Сообщения с плейсхолдерами:
  # %duration% - время мута
  # %reason% - причина
  # %player% - замученный игрок
  # %operator% - модератор
  
  messages:
    muted: "&#FF6B6B%player% &#888888был замучен на &#FF6B6B%duration% &#888888модератором &#FF6B6B%operator%&#888888. Причина: &#FF6B6B%reason%"
    unmuted: "&#6BCB77%player% &#888888был размучен модератором &#6BCB77%operator%"
    you-muted: "&#FF6B6BВы замучены на %duration%! Причина: %reason%"
    you-muted-permanent: "&#FF6B6BВы замучены навсегда! Причина: %reason%"
    cannot-chat: "&#FF6B6BВы замучены! Осталось: %duration%"
    cannot-chat-permanent: "&#FF6B6BВы замучены навсегда!"
    silent-muted: "&#888888[Тихо] &#FF6B6B%player% &#888888замучен на &#FF6B6B%duration% &#888888(%operator%). Причина: %reason%"
    silent-unmuted: "&#888888[Тихо] &#6BCB77%player% &#888888размучен (%operator%)"
  
  # Причина по умолчанию если не указана
  default-reason: "Нарушение правил"
  
  # Максимальное время мута по умолчанию (если не указано время)
  default-duration: "7d"
  
  # Доступные длительности для прав lochat.mute.dur.<время>
  durations:
    - "10m"
    - "30m"
    - "1h"
    - "6h"
    - "12h"
    - "1d"
    - "3d"
    - "7d"
    - "14d"
    - "30d"
    - "perm"

# ┌─────────────────────────────────────────────────────────────────────────────┐
# │                            ФИЛЬТРЫ СООБЩЕНИЙ                               │
# └─────────────────────────────────────────────────────────────────────────────┘

filters:
  url:
    enabled: true
    whitelist:
      - "youtube.com"
      - "youtu.be"
      - "discord.gg"
      - "twitch.tv"
    blacklist:
      - "scam-site.com"
    blocked-message: "&#FF6B6BС&#FF5F5Fс&#FF5353ы&#FF4747л&#FF3B3Bк&#FF2F2Fи &#FF2323з&#FF1717а&#FF0B0Bп&#FF0000р&#FF0000е&#FF0000щ&#FF0000е&#FF0000н&#FF0000ы!"
  
  ip:
    enabled: true
    block: false
    replacement: "[IP скрыт]"
    blocked-message: "&#FF6B6BI&#FF5F5FP &#FF5353а&#FF4747д&#FF3B3Bр&#FF2F2Fе&#FF2323с&#FF1717а &#FF0B0Bз&#FF0000а&#FF0000п&#FF0000р&#FF0000е&#FF0000щ&#FF0000е&#FF0000н&#FF0000ы!"
  
  repeat:
    enabled: true
    max-repeats: 3

# ┌─────────────────────────────────────────────────────────────────────────────┐
# │                            УПОМИНАНИЯ                                      │
# └─────────────────────────────────────────────────────────────────────────────┘

advanced-mentions:
  enabled: true
  everyone:
    enabled: true
    permission: "lochat.mention.everyone"
  here:
    enabled: true
    permission: "lochat.mention.here"
  role:
    enabled: true
    permission: "lochat.mention.role"