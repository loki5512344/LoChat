# LoChat Gradient Module Configuration
# Модуль градиентных ников (интегрированный LoPreff)

# Включить/выключить модуль
enabled: true

# Максимальное количество цветов в градиенте
max-colors: 7

# Минимальное количество цветов
min-colors: 1

# Цена за каждый цвет (PlayerPoints)
price-per-color: 50

# Цена за префикс
prefix-price: 500

# Покупка префикса один раз (потом бесплатно)
prefix-one-time-purchase: true

# Кулдаун на смену цвета (секунды)
color-cooldown: 60

# Кулдаун на смену префикса (секунды)
prefix-cooldown: 300

# Максимальная длина префикса
max-prefix-length: 7

# Формат префикса ({prefix} - сам префикс)
prefix-format: "[{prefix}] "

# Применять градиент на префикс
gradient-on-prefix: true

# Применять градиент на LuckPerms префикс (если нет кастомного)
gradient-on-luckperms-prefix: true

# Единый градиент на префикс + ник
continuous-gradient: true

# Использовать &#RRGGBB формат (true) или <#RRGGBB> (false)
use-legacy-rgb-format: false

# Отображение над игроком
display:
  # Обновлять display name игрока (показывает префикс+ник над головой)
  update-display-name: true
  # Обновлять tab list
  update-tab-list: true
  # Использовать TextDisplay вместо обычного display name (1.19.4+)
  use-text-display: true
  # Высота TextDisplay над игроком (в блоках)
  text-display-height: 2.8
  # Размер TextDisplay (от 0.1 до 2.0)
  text-display-scale: 0.8
  # Видно ли TextDisplay через стены
  text-display-see-through: false
  # Формат TextDisplay (поддерживает плейсхолдеры)
  text-display-format: "{prefix}{player}"

# Тип хранилища: YAML или SQLITE
storage-type: YAML

# Файл SQLite базы данных
sqlite-file: gradient-data.db

# Чёрный список префиксов (нельзя использовать)
prefix-blacklist:
  - admin
  - owner
  - moder
  - helper
  - staff
  - модер
  - админ
  - хелпер
