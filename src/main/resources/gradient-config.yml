# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║                           LoChat Gradient Config                            ║
# ║                      Настройки градиентных ников                           ║
# ║                              Версия: 1.5.5-1.20.1                          ║
# ╚══════════════════════════════════════════════════════════════════════════════╝

# ┌─────────────────────────────────────────────────────────────────────────────┐
# │                            ОСНОВНЫЕ НАСТРОЙКИ                               │
# └─────────────────────────────────────────────────────────────────────────────┘

# Включить градиентные ники
enabled: true

# Тип хранения данных: file или sqlite
storage-type: "file"

# ┌─────────────────────────────────────────────────────────────────────────────┐
# │                            НАСТРОЙКИ ЦВЕТОВ                                │
# └─────────────────────────────────────────────────────────────────────────────┘

# Минимальное количество цветов в градиенте
min-colors: 1

# Максимальное количество цветов в градиенте
max-colors: 7

# Цена за каждый цвет (PlayerPoints)
price-per-color: 50

# ┌─────────────────────────────────────────────────────────────────────────────┐
# │                            НАСТРОЙКИ ПРЕФИКСОВ                             │
# └─────────────────────────────────────────────────────────────────────────────┘

# Цена за префикс (PlayerPoints)
prefix-price: 500

# Одноразовая покупка префикса (true) или за каждое изменение (false)
prefix-one-time-purchase: true

# Максимальная длина префикса (символы)
max-prefix-length: 16

# ┌─────────────────────────────────────────────────────────────────────────────┐
# │                              КУЛДАУНЫ                                      │
# └─────────────────────────────────────────────────────────────────────────────┘

# Кулдаун на изменение цвета (секунды)
color-cooldown: 60

# Кулдаун на изменение префикса (секунды)
prefix-cooldown: 120

# ┌─────────────────────────────────────────────────────────────────────────────┐
# │                            ИНТЕГРАЦИИ                                      │
# └─────────────────────────────────────────────────────────────────────────────┘

# Интеграция с LuckPerms
luckperms:
  # Включить интеграцию
  enabled: true
  # Приоритет префикса в LuckPerms
  prefix-priority: 100
  # Обновлять префикс в LuckPerms при изменении
  update-prefix: true

# Интеграция с PlayerPoints
playerpoints:
  # Включить интеграцию (покупки за поинты)
  enabled: true
  # Показывать баланс в GUI
  show-balance: true

# ┌─────────────────────────────────────────────────────────────────────────────┐
# │                            ПРЕДУСТАНОВКИ                                   │
# └─────────────────────────────────────────────────────────────────────────────┘

# Предустановленные градиенты
presets:
  fire: [ "#FF4500", "#FF6347", "#FFD700" ]
  ocean: [ "#00CED1", "#1E90FF", "#4169E1" ]
  forest: [ "#228B22", "#32CD32", "#90EE90" ]
  sunset: [ "#FF69B4", "#FF1493", "#DC143C" ]
  rainbow: [ "#FF0000", "#FF7F00", "#FFFF00", "#00FF00", "#0000FF", "#4B0082", "#9400D3" ]
  ice: [ "#B0E0E6", "#87CEEB", "#4682B4" ]
  gold: [ "#FFD700", "#FFA500", "#FF8C00" ]
  purple: [ "#9370DB", "#8A2BE2", "#4B0082" ]
  pink: [ "#FFB6C1", "#FF69B4", "#FF1493" ]
  green: [ "#00FF7F", "#00FA9A", "#98FB98" ]

# ┌─────────────────────────────────────────────────────────────────────────────┐
# │                              GUI НАСТРОЙКИ                                 │
# └─────────────────────────────────────────────────────────────────────────────┘

gui:
  # Название GUI подтверждения
  confirm-title: "<gradient:#FFD700:#FFA500>Подтверждение покупки</gradient>"
  
  # Размер GUI (9, 18, 27, 36, 45, 54)
  size: 27
  
  # Предметы в GUI
  items:
    confirm:
      material: "GREEN_WOOL"
      name: "<gradient:#6BCB77:#4ECDC4>✓ Подтвердить</gradient>"
      lore:
        - "<gray>Нажмите для подтверждения"
        - "<gray>покупки градиента"
    
    cancel:
      material: "RED_WOOL"
      name: "<gradient:#FF6B6B:#FF4757>✗ Отменить</gradient>"
      lore:
        - "<gray>Нажмите для отмены"
        - "<gray>покупки"
    
    info:
      material: "PAPER"
      name: "<gradient:#FFA726:#FF9800>Информация</gradient>"
      lore:
        - "<gray>Цена: <yellow>{price} поинтов</yellow>"
        - "<gray>Цвета: <white>{colors}</white>"
        - ""
        - "<gray>Ваш баланс: <yellow>{balance}</yellow>"

# ┌─────────────────────────────────────────────────────────────────────────────┐
# │                            РАЗРЕШЕНИЯ                                      │
# └─────────────────────────────────────────────────────────────────────────────┘

# Автоматические разрешения для групп
permissions:
  # Группы, которые получают бесплатные градиенты
  free-groups:
    - "vip"
    - "premium"
    - "admin"
  
  # Группы, которые могут использовать любые цвета
  unlimited-colors:
    - "admin"
    - "owner"