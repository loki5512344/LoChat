# LoChat - Автосообщения
# Автор: loki
#
# Смайлики настраиваются в emojis.yml

# ═══════════════════════════════════════════
# НАСТРОЙКИ
# ═══════════════════════════════════════════
settings:
  enabled: true
  interval: 300  # Интервал между сообщениями (секунды)
  prefix: "&6[&eINFO&6]&r"
  
  # Режим отправки:
  # - "sequential" — по порядку (1, 2, 3...)
  # - "random" — случайный порядок
  # - "custom" — свой порядок (указать в order)
  mode: "sequential"
  
  # Свой порядок (для mode: custom)
  # Можно указывать названия или номера
  # Пример: "welcome, rules, 3, donate, tips"
  order: "welcome, motd, rules, donate, tips, discord"

# ═══════════════════════════════════════════
# СООБЩЕНИЯ
# ═══════════════════════════════════════════
messages:
  # Приветствие (однострочное)
  welcome: "&aДобро пожаловать на сервер! &e:star:"
  
  # MOTD (многострочное)
  motd:
    - "&6╔══════════════════════════════════╗"
    - "&6║  &e:star: &fДобро пожаловать! &e:star:  &6║"
    - "&6║  &7Онлайн: &a%online% &7игроков       &6║"
    - "&6║  &7Сайт: &bexample.com            &6║"
    - "&6╚══════════════════════════════════╝"
  
  # Правила
  rules:
    - "&c&l:warning: ПРАВИЛА СЕРВЕРА :warning:"
    - "&71. &fНе гриферить"
    - "&72. &fНе читерить"
    - "&73. &fУважать игроков"
    - "&aПолные правила: &e/rules"
  
  # Донат
  donate:
    - "&#FFD700&l:gem: ДОНАТ :gem:"
    - "&7Поддержи сервер и получи"
    - "&7крутые привилегии!"
    - "&eПодробнее: &a/donate"
  
  # Советы
  tips:
    - "&b:zap: &fСовет дня:"
    - "&7Используй &e/sethome &7чтобы"
    - "&7сохранить свою локацию!"
  
  # Discord
  discord: "&9:game: &fНаш Discord: &bdiscord.gg/example"
  
  # Голосование
  vote: "&a:thumbsup: &fГолосуй за сервер: &e/vote &7и получи награды!"
  
  # Градиентное сообщение
  gradient:
    - "<gradient:#FF6B6B:#4ECDC4>━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━</gradient>"
    - ""
    - "  &f:fire: &eСпециальное событие!"
    - "  &7Двойной опыт до конца недели!"
    - ""
    - "<gradient:#4ECDC4:#FF6B6B>━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━</gradient>"
