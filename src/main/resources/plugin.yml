name: LoChat
version: '1.5.5-1.20.1'
main: com.loki.lochat.LoChat
api-version: '1.20'
folia-supported: true
author: loki
description: Advanced chat plugin for Paper 1.20.1 with gradient nicks

softdepend:
  - PlaceholderAPI
  - PlayerPoints
  - LuckPerms
  - LibertyBans
  - SkinsRestorer

commands:
  g:
    description: Send global message
    usage: /g <message>
    permission: chat.global.use
    aliases: [ п ]

  globalchat:
    description: Toggle global chat
    usage: /globalchat toggle
    permission: chat.global.toggle
    aliases: [ пдщифдсрфе ]

  l:
    description: Send local message
    usage: /l <message>
    permission: chat.local.use
    aliases: [ д ]

  msg:
    description: Send private message
    usage: /msg <player> <message>
    permission: chat.pm.use
    aliases: [ tell, w, pm, m, ьып, ееддж, цж, зьж, ьж ]

  reply:
    description: Reply to last message
    usage: /reply <message>
    permission: chat.pm.use
    aliases: [ r, ответить, кузду, к ]

  ignore:
    description: Ignore player
    usage: /ignore <player>
    permission: chat.pm.ignore
    aliases: [ игнор, шптщку ]

  unignore:
    description: Unignore player
    usage: /unignore <player>
    permission: chat.pm.ignore
    aliases: [ разигнор, гтшптщку ]

  ignorelist:
    description: List ignored players
    usage: /ignorelist
    permission: chat.pm.ignore
    aliases: [ игнорлист, шптщкудшые ]

  announce:
    description: Send announcement
    usage: /announce <message>
    permission: chat.announce.use
    aliases: [ объявление, анонс, фттщгтсу ]

  nick:
    description: Set custom nickname
    usage: /nick [nickname|reset]
    permission: lochat.nick
    aliases: [ ник, тшсл ]

  chatspy:
    description: Toggle chat spy mode
    usage: /chatspy
    permission: chat.spy
    aliases: [ spy, шпион, срфезуж, зуж ]

  clearchat:
    description: Clear chat for all players
    usage: /clearchat
    permission: chat.clear
    aliases: [ cc, очиститьчат, сдуфксрфе, сс ]

  clearchatconfig:
    description: Configure clear chat message
    usage: /clearchatconfig <enable|disable|message|status> [text]
    permission: lochat.clearchat.config
    aliases: [ ccc, настройкаочистки ]

  hub:
    description: Connect to hub server
    usage: /hub
    aliases: [ lobby, хаб, рги ]

  lochat:
    description: LoChat admin command
    usage: /lochat [reload]
    permission: lochat.admin
    aliases: [ дщсрфе ]

  color:
    description: Set gradient nick color
    usage: /color <hex1> [hex2] ...
    permission: gradient.color
    aliases: [ gradient, цвет, градиент, сщдщк, пкфвшуте ]

  prefix:
    description: Set custom prefix
    usage: /prefix <text>
    permission: gradient.prefix
    aliases: [ префикс, зкуашч ]

  aprefix:
    description: Admin gradient commands
    usage: /aprefix <subcommand>
    permission: gradient.admin
    aliases: [ gradientadmin, азкуашч, пкфвшуетефвьшт ]

  lmute:
    description: Mute a player
    usage: /lmute <player> [time] [-s] [reason]
    permission: lochat.mute
    aliases: [ mute, мут, ьгеу ]

  lunmute:
    description: Unmute a player
    usage: /lunmute <player> [-s]
    permission: lochat.unmute
    aliases: [ unmute, размут, гтьгеу ]

  lmutelist:
    description: List all active mutes
    usage: /lmutelist
    permission: lochat.mutelist
    aliases: [ mutelist, мутлист, ьгеудшые ]

  lmutehistory:
    description: View mute history of a player
    usage: /lmutehistory <player>
    permission: lochat.mutehistory
    aliases: [ mutehistory, мутистория, ьгеершыещку ]

  lmuteblame:
    description: View mutes issued by a moderator
    usage: /lmuteblame <moderator>
    permission: lochat.muteblame
    aliases: [ muteblame, мутблейм, ьгеуидфьу ]

  # ═══════════════════════════════════════════════════════════════════════════════
  #                              КАСТОМНЫЕ КОМАНДЫ
  # ═══════════════════════════════════════════════════════════════════════════════

  help:
    description: Show server help
    usage: /help
    aliases: [ помощь, хелп ]

  rules:
    description: Show server rules
    usage: /rules
    aliases: [ правила, rule ]

  discord:
    description: Discord integration management
    usage: /discord [status|reload|test]
    permission: lochat.discord.admin
    aliases: [ дискорд, ds ]

  website:
    description: Show website link
    usage: /website
    aliases: [ сайт, site ]

  coords:
    description: Show your coordinates
    usage: /coords
    aliases: [ координаты, pos, position ]

  time:
    description: Show server time
    usage: /time
    aliases: [ время, дата ]

  playerinfo:
    description: Show player information
    usage: /playerinfo [player]
    permission: lochat.playerinfo
    aliases: [ pinfo, инфо, info ]

  sounds:
    description: Toggle sound effects
    usage: /sounds [on|off]
    aliases: [ звуки, sound ]

  automessage:
    description: Toggle auto messages
    usage: /automessage [on|off]
    aliases: [ автосообщения, am ]

  stats:
    description: Show chat statistics
    usage: /stats [player]
    permission: lochat.stats
    aliases: [ статистика, статы ]

  top:
    description: Show top chatters
    usage: /top [messages|playtime]
    aliases: [ топ, рейтинг ]

  me:
    description: Send action message
    usage: /me <action>
    permission: chat.me
    aliases: [ action, действие ]

  broadcast:
    description: Broadcast message to all players
    usage: /broadcast <message>
    permission: lochat.broadcast
    aliases: [ bc, объявить ]

  maintenance:
    description: Toggle maintenance mode
    usage: /maintenance [on|off] [reason]
    permission: lochat.maintenance
    aliases: [ тех-работы, техработы ]

  motd:
    description: Show message of the day
    usage: /motd
    aliases: [ сообщение-дня, мотд ]

  ping:
    description: Show your ping
    usage: /ping [player]
    aliases: [ пинг ]

  list:
    description: Show online players
    usage: /list
    aliases: [ онлайн, online, who ]

  afk:
    description: Toggle AFK status
    usage: /afk [reason]
    aliases: [ афк, away ]

  back:
    description: Return from AFK
    usage: /back
    aliases: [ назад, return ]

  tps:
    description: Show server TPS
    usage: /tps
    permission: lochat.tps
    aliases: [ тпс, performance ]

  memory:
    description: Show server memory usage
    usage: /memory
    permission: lochat.memory
    aliases: [ mem, память, ram ]

  version:
    description: Show plugin version
    usage: /version
    permission: lochat.version
    aliases: [ ver, версия ]

  reload:
    description: Reload plugin configuration
    usage: /reload
    permission: lochat.reload
    aliases: [ rl, перезагрузить ]

permissions:
  chat.global.use:
    default: true
  chat.global.toggle:
    default: true
  chat.global.color:
    default: op
  chat.local.use:
    default: true
  chat.local.color:
    default: op
  chat.pm.use:
    default: true
  chat.pm.ignore:
    default: true
  chat.announce.use:
    default: op
  chat.announce.reload:
    default: op
  chat.spy:
    default: op
  chat.clear:
    default: op
  chat.bypass.cooldown:
    default: op
  chat.bypass.filter:
    default: op
  chat.bypass.antispam:
    default: op
  chat.mention.use:
    default: true
  gradient.color:
    default: true
  gradient.prefix:
    default: true
  gradient.admin:
    default: op
  gradient.bypass.cooldown:
    default: op
  gradient.bypass.cost:
    default: op
  lochat.admin:
    default: op
  lochat.mute:
    default: op
  lochat.unmute:
    default: op
  lochat.mutelist:
    default: op
  lochat.mutehistory:
    default: op
  lochat.muteblame:
    default: op
  lochat.mute.silent:
    description: Can use silent mute (-s flag)
    default: op
  lochat.mute.see-silent:
    description: Can see silent mute notifications
    default: op
  lochat.mute.dur.10m:
    description: Can mute for 10 minutes
    default: false
  lochat.mute.dur.30m:
    description: Can mute for 30 minutes
    default: false
  lochat.mute.dur.1h:
    description: Can mute for 1 hour
    default: false
  lochat.mute.dur.6h:
    description: Can mute for 6 hours
    default: false
  lochat.mute.dur.12h:
    description: Can mute for 12 hours
    default: false
  lochat.mute.dur.1d:
    description: Can mute for 1 day
    default: false
  lochat.mute.dur.3d:
    description: Can mute for 3 days
    default: false
  lochat.mute.dur.7d:
    description: Can mute for 7 days
    default: op
  lochat.mute.dur.14d:
    description: Can mute for 14 days
    default: false
  lochat.mute.dur.30d:
    description: Can mute for 30 days
    default: false
  lochat.mute.dur.perm:
    description: Can mute permanently
    default: op
  lochat.clearchat.config:
    description: Can configure clear chat message
    default: op
  lochat.heademoji.use:
    description: Can use head emojis in chat
    default: true
  lochat.nick:
    description: Can use custom nicknames
    default: true
  lochat.mention.everyone:
    description: Can mention @everyone
    default: op
  lochat.mention.here:
    description: Can mention @here
    default: op
  lochat.mention.role:
    description: Can mention @role:<permission>
    default: op
  lochat.bypass.urlfilter:
    description: Bypass URL filter
    default: op
  lochat.bypass.ipfilter:
    description: Bypass IP filter
    default: op
  lochat.bypass.caps:
    description: Bypass caps filter
    default: op
  lochat.bypass.hiddenurls:
    description: Bypass hidden URLs filter
    default: op
  lochat.bypass.domains:
    description: Bypass domains filter
    default: op

  # ═══════════════════════════════════════════════════════════════════════════════
  #                              ПРАВА КАСТОМНЫХ КОМАНД
  # ═══════════════════════════════════════════════════════════════════════════════

  lochat.playerinfo:
    description: Can view player information
    default: op
  lochat.stats:
    description: Can view chat statistics
    default: op
  chat.me:
    description: Can use /me command
    default: true
  lochat.broadcast:
    description: Can broadcast messages
    default: op
  lochat.maintenance:
    description: Can toggle maintenance mode
    default: op
  lochat.tps:
    description: Can view server TPS
    default: op
  lochat.memory:
    description: Can view server memory
    default: op
  lochat.version:
    description: Can view plugin version
    default: true
  lochat.reload:
    description: Can reload plugin
    default: op
  lochat.afk:
    description: Can use AFK commands
    default: true
  lochat.ping.others:
    description: Can view other players' ping
    default: op
  lochat.discord.admin:
    description: Can manage Discord integration
    default: op
