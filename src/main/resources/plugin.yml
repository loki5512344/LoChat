name: LoChat
version: '1.5.4'
main: com.loki.lochat.LoChat
api-version: '1.21'
folia-supported: true
author: loki
description: Advanced chat plugin for Folia with gradient nicks

softdepend:
  - PlaceholderAPI
  - PlayerPoints
  - LuckPerms

commands:
  g:
    description: Send global message
    usage: /g <message>
    permission: chat.global.use
    aliases: [п]

  globalchat:
    description: Toggle global chat
    usage: /globalchat toggle
    permission: chat.global.toggle
    aliases: [пдщифдсрфе]

  l:
    description: Send local message
    usage: /l <message>
    permission: chat.local.use
    aliases: [д]

  msg:
    description: Send private message
    usage: /msg <player> <message>
    permission: chat.pm.use
    aliases: [tell, w, pm, m, ьып, ееддж, цж, зьж, ьж]

  reply:
    description: Reply to last message
    usage: /reply <message>
    permission: chat.pm.use
    aliases: [r, ответить, кузду, к]

  ignore:
    description: Ignore player
    usage: /ignore <player>
    permission: chat.pm.ignore
    aliases: [игнор, шптщку]

  unignore:
    description: Unignore player
    usage: /unignore <player>
    permission: chat.pm.ignore
    aliases: [разигнор, гтшптщку]

  announce:
    description: Send announcement
    usage: /announce <message>
    permission: chat.announce.use
    aliases: [объявление, анонс, фттщгтсу]

  chatspy:
    description: Toggle chat spy mode
    usage: /chatspy
    permission: chat.spy
    aliases: [spy, шпион, срфезуж, зуж]

  clearchat:
    description: Clear chat for all players
    usage: /clearchat
    permission: chat.clear
    aliases: [cc, очиститьчат, сдуфксрфе, сс]

  mute:
    description: Mute player
    usage: /mute <player> <time> [reason]
    permission: chat.mute
    aliases: [мут, ьгеу]

  unmute:
    description: Unmute player
    usage: /unmute <player>
    permission: chat.mute
    aliases: [размут, гтьгеу]

  lochat:
    description: LoChat admin command
    usage: /lochat [reload]
    permission: lochat.admin
    aliases: [дщсрфе]

  color:
    description: Set gradient nick color
    usage: /color <hex1> [hex2] ...
    permission: gradient.color
    aliases: [gradient, цвет, градиент, сщдщк, пкфвшуте]

  prefix:
    description: Set custom prefix
    usage: /prefix <text>
    permission: gradient.prefix
    aliases: [префикс, зкуашч]

  aprefix:
    description: Admin gradient commands
    usage: /aprefix <subcommand>
    permission: gradient.admin
    aliases: [gradientadmin, азкуашч, пкфвшуетефвьшт]

permissions:
  chat.global.use:
    default: true
  chat.global.toggle:
    default: true
  chat.global.color:
    default: op
  chat.local.use:
    default: true
  chat.local.color:
    default: op
  chat.pm.use:
    default: true
  chat.pm.ignore:
    default: true
  chat.announce.use:
    default: op
  chat.announce.reload:
    default: op
  chat.spy:
    default: op
  chat.clear:
    default: op
  chat.mute:
    default: op
  chat.bypass.cooldown:
    default: op
  chat.bypass.filter:
    default: op
  chat.bypass.antispam:
    default: op
  chat.mention.use:
    default: true
  gradient.color:
    default: true
  gradient.prefix:
    default: true
  gradient.admin:
    default: op
  gradient.bypass.cooldown:
    default: op
  gradient.bypass.cost:
    default: op
  lochat.admin:
    default: op
