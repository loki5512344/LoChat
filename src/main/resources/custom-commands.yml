# Команды для администрации
broadcast:
  enabled: true
  permission: "lochat.broadcast"
  message: "{message}"
  aliases: ["bc", "объявить"]
  type: "broadcast"
  target: "all"

maintenance:
  enabled: false
  permission: "lochat.maintenance"
  message: "<#FFA726><bold>🔧 Сервер переведен в режим технических работ</bold></color>"
  aliases: ["тех-работы", "техработы"]
  type: "title"
  target: "all"