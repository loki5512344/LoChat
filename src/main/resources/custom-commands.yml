# Информационные команды
help:
  enabled: true
  message: |
    <gradient:#FFD700:#FFA500><bold>▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬</bold></gradient>
    <gradient:#87CEEB:#4169E1><bold>📚 Помощь по серверу</bold></gradient>
    
    <#FFEB3B>🏠 Основные команды:</color>
    <#9E9E9E>• <#FFFFFF>/spawn</color> - телепорт на спавн
    <#9E9E9E>• <#FFFFFF>/home</color> - телепорт домой
    <#9E9E9E>• <#FFFFFF>/sethome</color> - установить дом
    
    <#FFEB3B>💬 Чат команды:</color>
    <#9E9E9E>• <#FFFFFF>!сообщение</color> - глобальный чат
    <#9E9E9E>• <#FFFFFF>/msg игрок</color> - личное сообщение
    <#9E9E9E>• <#FFFFFF>/reply</color> - ответить на ЛС
    
    <#FFEB3B>🎨 Кастомизация:</color>
    <#9E9E9E>• <#FFFFFF>/color</color> - градиентный ник
    <#9E9E9E>• <#FFFFFF>/prefix</color> - кастомный префикс
    
    <gradient:#FFD700:#FFA500><bold>▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬</bold></gradient>
  aliases: ["помощь", "хелп"]
  type: "chat"
  target: "sender"

rules:
  enabled: true
  message: |
    <gradient:#FF6B6B:#FF4500><bold>▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬</bold></gradient>
    <gradient:#87CEEB:#4169E1><bold>📋 Правила сервера</bold></gradient>
    
    <#F44336><bold>🚫 Запрещено:</bold></color>
    <#9E9E9E>• Читерство и использование модов
    <#9E9E9E>• Гриферство и воровство
    <#9E9E9E>• Мат и оскорбления
    <#9E9E9E>• Спам в чате
    <#9E9E9E>• Реклама других серверов
    
    <#4CAF50><bold>✅ Разрешено:</bold></color>
    <#9E9E9E>• Строительство в любом стиле
    <#9E9E9E>• Торговля между игроками
    <#9E9E9E>• Создание команд и кланов
    <#9E9E9E>• Использование /home и /spawn
    
    <#FFA726><bold>⚠️ За нарушения:</bold></color>
    <#9E9E9E>• Предупреждение → Мут → Бан
    
    <gradient:#FF6B6B:#FF4500><bold>▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬</bold></gradient>
  aliases: ["правила", "rule"]
  type: "chat"
  target: "sender"

