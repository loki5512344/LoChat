# ┌─────────────────────────────────────────────────────────────────────────────┐
# │ Chat spy (moderation)                                                        │
# └─────────────────────────────────────────────────────────────────────────────┘

spy:
  enabled: "&#9878C9Режим шпиона &#7858E9включён"
  disabled: "&#9878C9Режим шпиона &#7858E9отключён"
  format: "&#7858E9[&#9878C9SPY&#7858E9] &#7858E9{sender} &#7858E9→ &#9878C9{receiver}&#7858E9: &f{message}"
