prefix: "<#04CADF>[LoChat]</#04CADF>"

global:
  disabled: "<#04CADF>Глобальный чат отключен</#04CADF>"
  toggled-on: "<#04CADF>Глобальный чат включен</#04CADF>"
  toggled-off: "<#04CADF>Глобальный чат отключен</#04CADF>"

local:
  no-players: "<#04CADF>Рядом нет игроков</#04CADF>"

pm:
  # Форматы личных сообщений
  # {sender} - ник отправителя, {receiver} - ник получателя
  # {sender_display} - отправитель с градиентом, {receiver_display} - получатель с градиентом
  # {message} - текст сообщения
  format-sent: "<gray>[PM] Ты → {receiver_display}<gray>: {message}</gray>"
  format-received: "<gray>[PM] {sender_display}<gray> → Ты: {message}</gray>"
  # Использовать градиентные ники в PM
  use-gradient-names: true
  # Старые форматы (для совместимости)
  sent: "<gray>[PM] Ты → {player}: {message}</gray>"
  received: "<gray>[PM] {player} → Ты: {message}</gray>"
  no-reply: "<#04CADF>Некому ответить</#04CADF>"
  ignored: "<#04CADF>Этот игрок вас игнорирует</#04CADF>"
  player-offline: "<#04CADF>Игрок не в сети</#04CADF>"
  self: "<#04CADF>Нельзя писать самому себе</#04CADF>"

ignore:
  added: "<#04CADF>Игрок {player} добавлен в игнор</#04CADF>"
  removed: "<#04CADF>Игрок {player} убран из игнора</#04CADF>"
  already-ignored: "<#04CADF>Игрок уже в игноре</#04CADF>"
  not-ignored: "<#04CADF>Игрок не в игноре</#04CADF>"
  self: "<#04CADF>Нельзя игнорировать себя</#04CADF>"

announce:
  reloaded: "<#04CADF>Конфигурация перезагружена</#04CADF>"

spy:
  enabled: "<#04CADF>Шпион режим включен</#04CADF>"
  disabled: "<#04CADF>Шпион режим выключен</#04CADF>"
  format: "<gray>[SPY] {sender} → {receiver}: {message}</gray>"

filter:
  blocked: "<#04CADF>Сообщение заблокировано (мат)</#04CADF>"
  warned: "<#04CADF>Предупреждение: не используйте мат!</#04CADF>"

cooldown:
  wait: "<#04CADF>Подождите {time} сек перед следующим сообщением</#04CADF>"

antispam:
  caps: "<#04CADF>Слишком много заглавных букв!</#04CADF>"
  repeat: "<#04CADF>Не повторяйте символы!</#04CADF>"
  similar: "<#04CADF>Не отправляйте одинаковые сообщения!</#04CADF>"

clearchat:
  cleared: "<#04CADF>Чат очищен администратором {player}</#04CADF>"

errors:
  no-permission: "<#04CADF>Нет прав!</#04CADF>"
  player-not-found: "<#04CADF>Игрок не найден</#04CADF>"
  invalid-usage: "<#04CADF>Использование: {usage}</#04CADF>"
