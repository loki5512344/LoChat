  try-format: "<color:#7858E9>* {player} пытается {action}...</color> {result}"
  try-success: "<color:#9878C9><bold>[Успех!]</bold></color>"
  try-fail: "<color:#CF6679><bold>[Провал!]</bold></color>"
  do-format: "<color:#7858E9>[<color:#7858E9>Сцена</color>]</color> <white>{description}</white> <color:#9878C9>({player})</color>"
  roll-format: "<color:#7858E9>* {player} бросает кубик и получает </color><color:#7858E9><bold>{result}</bold></color><color:#7858E9> из </color><color:#9878C9>{max}</color>"
