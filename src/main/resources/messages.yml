pm:
  # Форматы личных сообщений
  # {sender} - ник отправителя, {receiver} - ник получателя
  # {sender_display} - отправитель с градиентом, {receiver_display} - получатель с градиентом
  # {message} - текст сообщение
  format-sent: "&7[→] &#87CEEBВы &7→ {receiver_display}&7: {message}"
  format-received: "&7[←] {sender_display} &7→ &#87CEEBВы&7: {message}"
  
  # Использовать градиентные ники в PM
  use-gradient-names: true
  
  # Старые форматы (для совместимости)
  sent: "&7[→] &#87CEEBВы &7→ &f{player}&7: {message}"
  received: "&7[←] &f{player} &7→ &#87CEEBВы&7: {message}"
  
  # Ошибки PM
  no-reply: "&#FF6B6BН&#FF5F5Fе&#FF5353к&#FF4747о&#FF3B3Bм&#FF2F2Fу &#FF2323о&#FF1717т&#FF0B0Bв&#FF0000е&#FF0000т&#FF0000и&#FF0000т&#FF0000ь"
