# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║                           LoChat — messages.yml                            ║
# ║  Default palette (Spacelegacy): #7858E9 (dusty rose) → #7858E9 (violet)     ║
# ╚══════════════════════════════════════════════════════════════════════════════╝
#
# Color roles (reference when editing strings below):
#   &#7858E9 — primary labels / body (dusty rose)
#   &#9878C9 — accents / separators (mid violet)
#   &#7858E9 — emphasis / values (deep violet)
#   &f / #E8E0F0 — message body white
#   &#CF6679 — errors (muted red, fits the palette)

prefix: "&#7858E9[&#9878C9L&#8B6BD6o&#7858E9C&#8565DCh&#8B6BD6a&#9878C9t&#7858E9]"

# ┌─────────────────────────────────────────────────────────────────────────────┐
# │ Global chat (toggle messages, server-disabled notice)                       │
# └─────────────────────────────────────────────────────────────────────────────┘

global:
  toggled-on: "&#9878C9Глобальный чат &#7858E9включён"
  toggled-off: "&#9878C9Глобальный чат &#7858E9отключён"
  disabled: "&#CF6679Глобальный чат отключён на этом сервере"

# ┌─────────────────────────────────────────────────────────────────────────────┐
# │ Local chat (no recipients nearby)                                            │
# └─────────────────────────────────────────────────────────────────────────────┘

local:
  no-players: "&#7858E9Рядом нет игроков"
  nobody-heard: "&#9878C9Вас никто не услышал &#7858E9— рядом нет игроков"

# ┌─────────────────────────────────────────────────────────────────────────────┐
# │ Private messages (/msg, /reply)                                             │
# └─────────────────────────────────────────────────────────────────────────────┘

pm:
  format-sent: "&#7858E9[&#9878C9→&#7858E9] &#9878C9Вы &#7858E9→ {receiver_display}&#7858E9: &f{message}"
  format-received: "&#7858E9[&#9878C9←&#7858E9] {sender_display} &#7858E9→ &#9878C9Вы&#7858E9: &f{message}"
  use-gradient-names: true
  sent: "&#7858E9[&#9878C9→&#7858E9] &#9878C9Вы &#7858E9→ &f{player}&#7858E9: &f{message}"
  received: "&#7858E9[&#9878C9←&#7858E9] &f{player} &#7858E9→ &#9878C9Вы&#7858E9: &f{message}"
  no-reply: "&#CF6679Некому ответить"
  ignored: "&#CF6679Этот игрок вас игнорирует"
  player-offline: "&#CF6679Игрок не в сети"
  self: "&#CF6679Нельзя писать самому себе"

