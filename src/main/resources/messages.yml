# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║                              LoChat Messages                                ║
# ║                        Сообщения плагина LoChat                            ║
# ║                              Версия: 1.5.5-1.20.1                          ║
# ╚══════════════════════════════════════════════════════════════════════════════╝

# ┌─────────────────────────────────────────────────────────────────────────────┐
# │                            ОСНОВНЫЕ СООБЩЕНИЯ                              │
# └─────────────────────────────────────────────────────────────────────────────┘

# Префикс плагина
prefix: "<gradient:#00D4FF:#0099CC>[LoChat]</gradient>"

# ┌─────────────────────────────────────────────────────────────────────────────┐
# │                            ГЛОБАЛЬНЫЙ ЧАТ                                  │
# └─────────────────────────────────────────────────────────────────────────────┘

global:
  disabled: "<gradient:#FF6B6B:#FF4757>Глобальный чат отключен</gradient>"
  toggled-on: "<gradient:#6BCB77:#4ECDC4>Глобальный чат включен</gradient>"
  toggled-off: "<gradient:#FF6B6B:#FF4757>Глобальный чат отключен</gradient>"

# ┌─────────────────────────────────────────────────────────────────────────────┐
# │                            ЛОКАЛЬНЫЙ ЧАТ                                   │
# └─────────────────────────────────────────────────────────────────────────────┘

local:
  no-players: "<gradient:#FFA726:#FF9800>Рядом нет игроков</gradient>"

# ┌─────────────────────────────────────────────────────────────────────────────┐
# │                            ЛИЧНЫЕ СООБЩЕНИЯ                                │
# └─────────────────────────────────────────────────────────────────────────────┘

pm:
  # Форматы личных сообщений
  # {sender} - ник отправителя, {receiver} - ник получателя
  # {sender_display} - отправитель с градиентом, {receiver_display} - получатель с градиентом
  # {message} - текст сообщения
  format-sent: "<gray>[PM]</gray> <gradient:#87CEEB:#4682B4>Ты</gradient> <gray>→</gray> {receiver_display}<gray>:</gray> {message}"
  format-received: "<gray>[PM]</gray> {sender_display} <gray>→</gray> <gradient:#87CEEB:#4682B4>Ты</gradient><gray>:</gray> {message}"
  
  # Использовать градиентные ники в PM
  use-gradient-names: true
  
  # Старые форматы (для совместимости)
  sent: "<gray>[PM]</gray> <gradient:#87CEEB:#4682B4>Ты</gradient> <gray>→</gray> <white>{player}</white><gray>:</gray> {message}"
  received: "<gray>[PM]</gray> <white>{player}</white> <gray>→</gray> <gradient:#87CEEB:#4682B4>Ты</gradient><gray>:</gray> {message}"
  
  # Ошибки PM
  no-reply: "<gradient:#FF6B6B:#FF4757>Некому ответить</gradient>"
  ignored: "<gradient:#FF6B6B:#FF4757>Этот игрок вас игнорирует</gradient>"
  player-offline: "<gradient:#FF6B6B:#FF4757>Игрок не в сети</gradient>"
  self: "<gradient:#FF6B6B:#FF4757>Нельзя писать самому себе</gradient>"

# ┌─────────────────────────────────────────────────────────────────────────────┐
# │                              ИГНОРИРОВАНИЕ                                 │
# └─────────────────────────────────────────────────────────────────────────────┘

ignore:
  added: "<gradient:#6BCB77:#4ECDC4>Игрок {player} добавлен в игнор</gradient>"
  removed: "<gradient:#6BCB77:#4ECDC4>Игрок {player} убран из игнора</gradient>"
  already-ignored: "<gradient:#FFA726:#FF9800>Игрок уже в игноре</gradient>"
  not-ignored: "<gradient:#FFA726:#FF9800>Игрок не в игноре</gradient>"
  self: "<gradient:#FF6B6B:#FF4757>Нельзя игнорировать себя</gradient>"

# ┌─────────────────────────────────────────────────────────────────────────────┐
# │                              ОБЪЯВЛЕНИЯ                                    │
# └─────────────────────────────────────────────────────────────────────────────┘

announce:
  reloaded: "<gradient:#6BCB77:#4ECDC4>Конфигурация перезагружена</gradient>"

# ┌─────────────────────────────────────────────────────────────────────────────┐
# │                              ШПИОН РЕЖИМ                                   │
# └─────────────────────────────────────────────────────────────────────────────┘

spy:
  enabled: "<gradient:#6BCB77:#4ECDC4>Шпион режим включен</gradient>"
  disabled: "<gradient:#FF6B6B:#FF4757>Шпион режим выключен</gradient>"
  format: "<gray>[SPY]</gray> <gradient:#FFD700:#FFA500>{sender}</gradient> <gray>→</gray> <gradient:#87CEEB:#4682B4>{receiver}</gradient><gray>:</gray> <white>{message}</white>"
  chat-format: "<gray>[SPY]</gray> <gradient:#FFA726:#FF9800>{type}</gradient> <gradient:#00FF88:#00CC66>{sender}</gradient><gray>:</gray> <white>{message}</white>"

# ┌─────────────────────────────────────────────────────────────────────────────┐
# │                              ФИЛЬТР МАТА                                   │
# └─────────────────────────────────────────────────────────────────────────────┘

filter:
  blocked: "<gradient:#FF6B6B:#FF4757>Сообщение заблокировано (недопустимые слова)</gradient>"
  warning: "<gradient:#FFA726:#FF9800>Предупреждение: не используйте недопустимые слова!</gradient>"

# ┌─────────────────────────────────────────────────────────────────────────────┐
# │                               КУЛДАУНЫ                                     │
# └─────────────────────────────────────────────────────────────────────────────┘

cooldown:
  wait: "<gradient:#FFA726:#FF9800>Подождите {time} сек перед следующим сообщением</gradient>"

# ┌─────────────────────────────────────────────────────────────────────────────┐
# │                               АНТИ-СПАМ                                    │
# └─────────────────────────────────────────────────────────────────────────────┘

antispam:
  caps: "<gradient:#FF6B6B:#FF4757>Слишком много заглавных букв!</gradient>"
  repeat: "<gradient:#FF6B6B:#FF4757>Не повторяйте символы!</gradient>"
  similar: "<gradient:#FF6B6B:#FF4757>Не отправляйте одинаковые сообщения!</gradient>"

# ┌─────────────────────────────────────────────────────────────────────────────┐
# │                            ОЧИСТКА ЧАТА                                    │
# └─────────────────────────────────────────────────────────────────────────────┘

clearchat:
  cleared: "<gradient:#6BCB77:#4ECDC4>Чат очищен администратором {player}</gradient>"

# ┌─────────────────────────────────────────────────────────────────────────────┐
# │                               ОШИБКИ                                       │
# └─────────────────────────────────────────────────────────────────────────────┘

errors:
  no-permission: "<gradient:#FF6B6B:#FF4757>Нет прав!</gradient>"
  player-not-found: "<gradient:#FF6B6B:#FF4757>Игрок не найден</gradient>"
  invalid-usage: "<gradient:#FFA726:#FF9800>Использование: {usage}</gradient>"

# ┌─────────────────────────────────────────────────────────────────────────────┐
# │                              СИСТЕМА МУТОВ                                 │
# └─────────────────────────────────────────────────────────────────────────────┘

mute:
  muted: "<gradient:#6BCB77:#4ECDC4>Игрок {player} замучен на {time}</gradient>"
  unmuted: "<gradient:#6BCB77:#4ECDC4>Игрок {player} размучен</gradient>"
  already-muted: "<gradient:#FFA726:#FF9800>Игрок уже замучен</gradient>"
  not-muted: "<gradient:#FFA726:#FF9800>Игрок не замучен</gradient>"
  you-muted: "<gradient:#FF6B6B:#FF4757>Вы замучены! Осталось: {time}</gradient>"
  permanent: "<gradient:#FF6B6B:#FF4757>Вы замучены навсегда!</gradient>"