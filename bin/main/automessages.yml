# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║                           LoChat Auto Messages                              ║
# ║                            Автосообщения чата                              ║
# ║                              Версия: 1.5.5-1.20.1                          ║
# ╚══════════════════════════════════════════════════════════════════════════════╝

# ┌─────────────────────────────────────────────────────────────────────────────┐
# │                            НАСТРОЙКИ                                       │
# └─────────────────────────────────────────────────────────────────────────────┘

settings:
  # Префикс автосообщений
  prefix: "<gradient:#00D4FF:#0099CC>[INFO]</gradient>"
  
  # Режим отправки: sequential (по порядку), random (случайно), custom (свой порядок)
  mode: "sequential"
  
  # Свой порядок сообщений (только для режима custom)
  # Можно указывать номера или названия сообщений
  order: "welcome, rules, discord, website"

# ┌─────────────────────────────────────────────────────────────────────────────┐
# │                            СООБЩЕНИЯ                                       │
# └─────────────────────────────────────────────────────────────────────────────┘

messages:
  # Приветственное сообщение
  welcome:
    - "<gradient:#FFD700:#FFA500>Добро пожаловать на наш сервер!</gradient>"
    - "<gray>Используйте</gray> <gradient:#87CEEB:#4682B4>/help</gradient> <gray>для получения помощи</gray>"
  
  # Правила сервера
  rules:
    - "<gradient:#FF6B6B:#FF4757>Соблюдайте правила сервера!</gradient>"
    - "<gray>Подробнее:</gray> <gradient:#87CEEB:#4682B4>/rules</gradient>"
  
  # Информация о Discord
  discord:
    - "<gradient:#7289DA:#5865F2>Присоединяйтесь к нашему Discord!</gradient>"
    - "<gray>Ссылка:</gray> <click:open_url:'https://discord.gg/example'><gradient:#87CEEB:#4682B4>discord.gg/example</gradient></click>"
  
  # Веб-сайт
  website:
    - "<gradient:#00FF88:#00CC66>Посетите наш сайт!</gradient>"
    - "<gray>Адрес:</gray> <click:open_url:'https://example.com'><gradient:#87CEEB:#4682B4>example.com</gradient></click>"
  
  # Донат информация
  donate:
    - "<gradient:#FFD700:#FFA500>Поддержите сервер!</gradient>"
    - "<gray>Донат:</gray> <click:open_url:'https://donate.example.com'><gradient:#87CEEB:#4682B4>donate.example.com</gradient></click>"
  
  # Градиентные ники
  gradients:
    - "<gradient:#9370DB:#8A2BE2>Создайте красивый ник!</gradient>"
    - "<gray>Команда:</gray> <gradient:#87CEEB:#4682B4>/color</gradient> <gray>для градиентов</gray>"
  
  # Чат команды
  chat-commands:
    - "<gradient:#FFA726:#FF9800>Полезные команды чата:</gradient>"
    - "<gradient:#87CEEB:#4682B4>/msg <игрок> <сообщение></gradient> <gray>- личное сообщение</gray>"
    - "<gradient:#87CEEB:#4682B4>/ignore <игрок></gradient> <gray>- игнорировать игрока</gray>"
  
  # Онлайн статистика
  online-stats:
    - "<gradient:#6BCB77:#4ECDC4>Сейчас онлайн: {online} игроков</gradient>"
    - "<gray>Максимум за день:</gray> <white>{max_online}</white>"
  
  # Время на сервере
  server-time:
    - "<gradient:#87CEEB:#4682B4>Время на сервере:</gradient> <white>{time}</white>"
    - "<gray>Дата:</gray> <white>{date}</white>"
  
  # События
  events:
    - "<gradient:#FF69B4:#FF1493>Следите за событиями!</gradient>"
    - "<gray>Расписание:</gray> <gradient:#87CEEB:#4682B4>/events</gradient>"

# ┌─────────────────────────────────────────────────────────────────────────────┐
# │                            ПЛЕЙСХОЛДЕРЫ                                    │
# └─────────────────────────────────────────────────────────────────────────────┘

# Доступные плейсхолдеры в сообщениях:
# {online} - количество игроков онлайн
# {max_online} - максимальное количество игроков (из server.properties)
# {time} - текущее время
# {date} - текущая дата
# {server_name} - название сервера
# {tps} - TPS сервера (если доступно)
# 
# Также поддерживаются все плейсхолдеры PlaceholderAPI