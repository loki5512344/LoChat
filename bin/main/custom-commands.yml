# LoChat custom commands
# Define your own commands with custom messages and actions.
#
# Fields:
#   enabled   - whether the command is active
#   permission - required permission (optional)
#   message   - message content (supports MiniMessage format)
#   aliases   - alternative command names
#   type      - chat | broadcast | title | actionbar | bungee
#   target    - sender | all | permission:<perm>
#   server    - (bungee only) target server name

help:
  enabled: true
  message: |
    <gray>Available commands:</gray>
    <gray>\u2022 <white>/spawn</white> - teleport to spawn
    <gray>\u2022 <white>/msg <player></white> - private message
    <gray>\u2022 <white>/color</white> - gradient nickname
    <gray>\u2022 <white>/prefix</white> - custom prefix
  aliases: []
  type: chat
  target: sender

rules:
  enabled: true
  message: |
    <red><bold>Server Rules</bold></red>
    <gray>1. No cheating or hacking</gray>
    <gray>2. No griefing or stealing</gray>
    <gray>3. No swearing or insults</gray>
    <gray>4. No spam</gray>
    <gray>5. No advertising</gray>
  aliases: []
  type: chat
  target: sender

discord:
  enabled: true
  message: |
    <color:#5865F2><bold>Join our Discord!</bold></color>
    <click:open_url:'https://discord.gg/yourserver'><u><color:#00BFFF>discord.gg/yourserver</color></u></click>
  aliases: ["ds"]
  type: chat
  target: sender

coords:
  enabled: true
  message: "<gold>\u25B6 <white>X: {x} Y: {y} Z: {z} <dark_gray>World: <green>{world}</green>"
  aliases: ["pos", "position"]
  type: chat
  target: sender

ping:
  enabled: true
  message: "<gold>\u25B6 <white>Your ping: <green>{ping}ms</green>"
  aliases: []
  type: chat
  target: sender

hub:
  enabled: true
  message: "<green>Connecting to hub...</green>"
  aliases: ["lobby"]
  type: bungee
  target: sender
  server: hub

broadcast:
  enabled: true
  permission: "lochat.broadcast"
  message: "{message}"
  aliases: ["bc"]
  type: broadcast
  target: all

maintenance:
  enabled: false
  permission: "lochat.maintenance"
  message: "<gold><bold>Server is now in maintenance mode</bold></gold>"
  aliases: []
  type: title
  target: all
