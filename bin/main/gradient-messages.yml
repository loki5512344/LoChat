# Цвета
color-help: |
  &#04CADF=== Команда /color ===
  &#04CADF/color <цвет1> [цвет2] ... &#808080— установить градиент
  &#04CADF/color on &#808080— включить цвет
  &#04CADF/color off &#808080— выключить цвет
  &#04CADF/color reset &#808080— сбросить цвет
  &#04CADF/color copy <игрок> &#808080— скопировать цвет
  &#808080Пример: /color #FF0000 #00FF00 #0000FF
