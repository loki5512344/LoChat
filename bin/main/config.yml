# LoChat main configuration
# All settings for chat, gradients, moderation, RP commands, sounds, and filters.

config-version: 6

# ── General ────────────────────────────────────────────────────────────────────

prefix: "&8[&3LoChat&8]"

# ── Chat System ────────────────────────────────────────────────────────────────

chat:
  global:
    enabled: true
    cooldown: 3

  local:
    enabled: true
    cooldown: 1
    radius: 100

  pm:
    enabled: true
    cooldown: 2

  min-message-length: 1
  max-message-length: 2000
  clear-lines: 100

# ── Chat Appearance ────────────────────────────────────────────────────────────

appearance:
  prefixes:
    global:
      emoji: "&b\u2726"
      text: "GLOBAL"
      separator: " &8\u25B6 "
      message-color: "&7"

    local:
      emoji: "&d\u25C6"
      text: "LOCAL"
      separator: " &8\u25B6 "
      message-color: "&7"

  chat-format:
    global: "{emoji} {prefix}{separator}{player_prefix}{player}{player_suffix}&f: {message}"
    local: "{emoji} {prefix}{separator}{player_prefix}{player}{player_suffix}&f: {message}"

  hover:
    enabled: true
    format:
      - "&8\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550"
      - " &b\u2726 &f{player}"
      - ""
      - " &7Ping: &b{ping}ms"
      - " &7Health: &a{health}&7/20"
      - " &7Food: &6{food}&7/20"
      - ""
      - "&8\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550"
      - " &7Click to message"

  emojis:
    ":heart:": "\u2764"
    ":star:": "\u2605"
    ":diamond:": "\u2666"
    ":check:": "\u2713"
    ":cross:": "\u2717"
    ":arrow:": "\u2192"
    ":smile:": ":)"
    ":sad:": ":("

# ── Gradient Nicknames & Prefixes ──────────────────────────────────────────────

gradient:
  enabled: true
  use-gradient-name: true
  use-custom-prefix: true

  display:
    update-display-name: true
    update-tab-list: true

  limits:
    min-colors: 1
    max-colors: 7
    max-prefix-length: 16

  pricing:
    price-per-color: 50
    prefix-price: 500
    prefix-one-time-purchase: true
    use-permission-instead-of-cost: false

  cooldowns:
    color: 60
    prefix: 120

  formatting:
    prefix-format: "[{prefix}] "
    gradient-on-prefix: true
    gradient-on-luckperms-prefix: true
    gradient-on-luckperms-suffix: true
    continuous-gradient: true

  storage:
    type: file
    sqlite-file: "gradient-data.db"

# ── RP Commands ────────────────────────────────────────────────────────────────

rp:
  radius: 100
  cooldowns:
    me: 3
    try: 5
    do: 3
    roll: 2

# ── Chat Filters ───────────────────────────────────────────────────────────────

filters:
  swear:
    enabled: true
    replace: false
    replacement: "***"

  url:
    enabled: true
    replacement: "&7[URL hidden]"

  ip:
    enabled: true
    replacement: "&7[IP hidden]"

  hidden-urls:
    enabled: true
    patterns:
      - "discord\\.gg"
      - "dsc\\.gg"
      - "bit\\.ly"
      - "tinyurl\\.com"

  spam:
    enabled: true
    max-repeating-chars: 5

  flood:
    enabled: true
    max-same-messages: 3

  caps:
    enabled: true
    max-caps-percent: 70
    min-length: 5

# ── Moderation ─────────────────────────────────────────────────────────────────

moderation:
  default-mute-duration: "7d"
  default-mute-reason: "No reason specified"
  default-ban-reason: "No reason specified"
  voice-mute-console-command: ""
  ban-kick-message: "&cYou have been banned!\n&7Reason: &f{reason}"

# ── Sounds ─────────────────────────────────────────────────────────────────────

sounds:
  mention:
    enabled: true
    sound: BLOCK_NOTE_BLOCK_PLING
    volume: 1.0
    pitch: 1.5

  pm:
    enabled: true
    sound: ENTITY_EXPERIENCE_ORB_PICKUP
    volume: 0.8
    pitch: 1.2

  command:
    enabled: false
    sound: UI_BUTTON_CLICK
    volume: 0.5
    pitch: 1.0

# ── Join / Quit / Death Messages ──────────────────────────────────────────────

messages:
  join:
    enabled: true
    format: "&7\u2726 &b{player} &7joined the server"

  quit:
    enabled: true
    format: "&7\u2726 &b{player} &7left the server"

  death:
    enabled: true
    player-kill: "&c\u2620 &7{player} was killed by &f{killer} &7(&f{weapon}&7)"
    mob-kill: "&c\u2620 &7{player} was slain by &f{killer}"
    default: "&c\u2620 &7{player} {death_message}"

# ── Hub Command ────────────────────────────────────────────────────────────────

hub-command:
  enabled: true
  server: "hub"
