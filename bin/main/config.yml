# LoChat Configuration v1.5.5
config-version: 4
prefix: "&#00D4FF[LoChat]"

# Базовые настройки чата
# Детальные настройки (префиксы, цвета, форматы) в config/*.yml

chat:
  # Режим чата:
  # - Оба включены = локальный (по умолчанию) + глобальный (с "!")
  # - Только global = единый чат без префиксов для всех
  global:
    enabled: true
    cooldown: 3
  local:
    enabled: true
    cooldown: 1
  pm:
    enabled: true
    cooldown: 2

# Hub команда
hub_command:
  enabled: true
  server: "hub"

# Градиентные ники
lopreff:
  enabled: true
  use-gradient-name: true
  use-custom-prefix: true

display:
  update-display-name: true
  update-tab-list: true

# Градиенты (детали в config/gradient.yml)
gradient:
  storage-type: "file"
  min-colors: 1
  max-colors: 7
  price-per-color: 50
  prefix-price: 500
  prefix-one-time-purchase: true
  use-permission-instead-of-cost: false
  max-prefix-length: 16
  color-cooldown: 60
  prefix-cooldown: 120
  prefix-format: "[{prefix}] "
  gradient-on-prefix: true
  gradient-on-luckperms-prefix: true
  continuous-gradient: true
  use-legacy-rgb-format: true

# RP команды (детали в config/rp.yml)
rp:
  radius: 100
  cooldowns:
    me: 3
    try: 5
    do: 3
    roll: 2

# Модерация: после /lmute выполнить команду от консоли (SimpleVoiceChat: voice mute {player})
moderation:
  voice-mute-console-command: ""
