# LoChat Configuration
# Author: loki
# Config Version: 2

config-version: 2

chat:
  global:
    enabled: true
    prefix: "[G]"
    format: "<prefix><player>: <message>"
    symbol: "!"
    cooldown: 3

  local:
    enabled: true
    radius: 100
    prefix: "[L]"
    format: "<player>: <message>"
    cooldown: 1

  pm:
    enabled: true
    log: false
    sound: true
    sound-type: "ENTITY_EXPERIENCE_ORB_PICKUP"

# Интеграция с GradientNick (LoPreff)
# Использует PlaceholderAPI плейсхолдеры
lopreff:
  enabled: true
  # Использовать градиентный ник в чате
  use-gradient-name: true
  # Использовать кастомный префикс
  use-custom-prefix: true

# Настройки отображения ника
display:
  # Обновлять display name игрока (показывает префикс+ник над головой)
  update-display-name: true
  # Обновлять tab list
  update-tab-list: true

# Упоминания @ник
mentions:
  enabled: true
  sound: true
  sound-type: "BLOCK_NOTE_BLOCK_PLING"
  # Выделение при @ник
  highlight: "&#04CADF@{player}"
  # Выделение когда твой ник написали (без @)
  self-highlight: "&#04CADF{player}"

# Фильтр мата
filter:
  enabled: true
  # Регулярные выражения для обнаружения мата с обходами
  patterns:
    # Основные корни с вариациями
    - "х\\s*у\\s*[йяёе]"           # хуй, хуя, хуё, хуе
    - "[хx]\\s*у\\s*[йяёе]"        # латиница: xuй
    - "п\\s*[иi]\\s*з\\s*д"        # пизд, пiзд
    - "п\\s*[иi]\\s*д\\s*[оа]\\s*р" # пидор, пидар
    - "[еeё]\\s*б\\s*[аоуыи]"      # ебать, ебут, ебал
    - "б\\s*л\\s*я\\s*[тдь]"       # блять, блядь
    - "с\\s*у\\s*к\\s*[аи]"        # сука, суки
    - "м\\s*у\\s*д\\s*[аи]"        # муда, муди
    - "г\\s*а\\s*н\\s*д\\s*о\\s*н" # гандон
    - "д\\s*р\\s*о\\s*ч"           # дрочить
    - "с\\s*с\\s*а\\s*т\\s*ь"      # ссать
    - "с\\s*р\\s*а\\s*т\\s*ь"      # срать
    - "ш\\s*м\\s*а\\s*р\\s*[аи]"   # шмара
    - "ч\\s*м\\s*[оы]"             # чмо, чмы
    - "г\\s*н\\s*и\\s*д\\s*[аы]"   # гнида
  
  # Простые слова (для быстрой проверки)
  words:
    # Основные
    - "хуй"
    - "хуя" 
    - "хуё"
    - "хуе"
    - "хуёк"
    - "хуёчек"
    - "хуесос"
    - "хуеплёт"
    - "пизда"
    - "пизде"
    - "пизду"
    - "пиздец"
    - "пиздюк"
    - "пиздюшка"
    - "пиздануть"
    - "спиздить"
    - "пиздоглазый"
    - "ебать"
    - "ебал"
    - "ебут"
    - "ебись"
    - "ебитесь"
    - "ебашить"
    - "уёбывать"
    - "заёбывать"
    - "ебашка"
    - "ебанарот"
    - "блять"
    - "блядь"
    - "блядина"
    - "сука"
    - "суки"
    - "сучка"
    - "мудак"
    - "мудила"
    - "мудачок"
    - "гандон"
    - "гандоник"
    - "пидор"
    - "пидорас"
    - "дрочить"
    - "дрочка"
    - "онанист"
    - "ссать"
    - "срать"
    - "говно"
    - "говнюк"
    - "шмара"
    - "шлюха"
    - "проститутка"
    - "чмо"
    - "чмошник"
    - "чмырь"
    - "гнида"
    - "тварь"
    - "падла"
    - "сволочь"
    - "охуеть"
    - "ахуеть"
    - "нихуя"
    - "кончепизд"
    
    # Обходы с символами
    - "х*й"
    - "п@зда"
    - "б#ять"
    - "хуй"
    - "ebat"
    - "pidar"
    - "mudak"
    
  action: "censor"  # censor/block/warn
  replacement: "***"

# Анти-спам
antispam:
  enabled: true
  max-caps-percent: 70
  max-repeat-chars: 5
  similar-message-delay: 30

automessages:
  enabled: true
  interval: 300
  random: false

formats:
  announcement: "&#04CADF[ОБЪЯВЛЕНИЕ] <message>"

# Настройки объявлений
announcements:
  # Показывать title при объявлении
  show-title: true
  # Заголовок title
  title-header: "&#04CADFОБЪЯВЛЕНИЕ"
  # Показывать actionbar при объявлении  
  show-actionbar: true
  # Время показа title (в секундах)
  title-duration: 3

# ========================================
# Система мутов
# ========================================
mute:
  # Сообщения с плейсхолдерами:
  # %duration% - время мута
  # %reason% - причина
  # %player% - замученный игрок
  # %operator% - модератор (чистый ник без префикса и цвета)
  
  messages:
    # Сообщение при муте (broadcast)
    muted: "&#FF6B6B%player% &#808080был замучен на &#FF6B6B%duration% &#808080модератором &#FF6B6B%operator%&#808080. Причина: &#FF6B6B%reason%"
    # Сообщение при размуте (broadcast)
    unmuted: "&#6BCB77%player% &#808080был размучен модератором &#6BCB77%operator%"
    # Сообщение замученному игроку
    you-muted: "&#FF6B6BВы замучены на %duration%! Причина: %reason%"
    # Сообщение при перманентном муте
    you-muted-permanent: "&#FF6B6BВы замучены навсегда! Причина: %reason%"
    # Сообщение при попытке написать в чат
    cannot-chat: "&#FF6B6BВы замучены! Осталось: %duration%"
    cannot-chat-permanent: "&#FF6B6BВы замучены навсегда!"
    # Тихий мут (только для тех кто видит)
    silent-muted: "&#808080[Тихо] &#FF6B6B%player% &#808080замучен на &#FF6B6B%duration% &#808080(%operator%). Причина: %reason%"
    silent-unmuted: "&#808080[Тихо] &#6BCB77%player% &#808080размучен (%operator%)"
  
  # Причина по умолчанию если не указана
  default-reason: "Нету."
  
  # Максимальное время мута по умолчанию (если не указано время)
  # Используется наивысшее доступное время из прав игрока
  # Формат: 1d, 7d, 30d, perm (перманентный)
  default-duration: "7d"
  
  # Доступные длительности для прав lochat.mute.dur.<время>
  # Игрок с правом lochat.mute.dur.7d может мутить максимум на 7 дней
  # lochat.mute.dur.perm - может мутить навсегда
  durations:
    - "10m"
    - "30m"
    - "1h"
    - "6h"
    - "12h"
    - "1d"
    - "3d"
    - "7d"
    - "14d"
    - "30d"
    - "perm"
