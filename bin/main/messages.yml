# LoChat player messages
# All messages sent to players. Supports & color codes and placeholders.

prefix: "&8[&3LoChat&8]"

# ── Global Chat ────────────────────────────────────────────────────────────────

global:
  toggled-on: "&aGlobal chat enabled"
  toggled-off: "&cGlobal chat disabled"
  disabled: "&cGlobal chat is disabled on this server"

# ── Local Chat ─────────────────────────────────────────────────────────────────

local:
  no-players: "&cNo players nearby"
  nobody-heard: "&7Nobody heard you — no players nearby"

# ── Private Messages ───────────────────────────────────────────────────────────

pm:
  format-sent: "&8[&a\u2192&8] &7You &a\u2192 &f{receiver_display}&8: &f{message}"
  format-received: "&8[&e\u2190&8] &f{sender_display} &e\u2192 &7You&8: &f{message}"
  no-reply: "&cNobody to reply to"
  ignored: "&cThis player is ignoring you"
  player-offline: "&cPlayer is not online"
  self: "&cYou cannot message yourself"

# ── Ignore List ────────────────────────────────────────────────────────────────

ignore:
  added: "&aPlayer &f{player} &ais now ignored"
  removed: "&aPlayer &f{player} &ais no longer ignored"
  already-ignored: "&7Player &f{player} &7is already ignored"
  not-ignored: "&7Player &f{player} &7is not ignored"
  self: "&cYou cannot ignore yourself"
  list-empty: "&7Your ignore list is empty"
  list-header: "&8\u2500\u2500\u2500\u2500\u2500 Ignored Players \u2500\u2500\u2500\u2500\u2500"
  list-footer: "&7Total: &f{count} &7players"

# ── Announcements ──────────────────────────────────────────────────────────────

announce:
  reloaded: "&aConfiguration reloaded"

# ── Chat Spy ───────────────────────────────────────────────────────────────────

spy:
  enabled: "&aSpy mode enabled"
  disabled: "&cSpy mode disabled"
  format: "&8[&4SPY&8] &f{sender} &8\u2192 &7{receiver}&8: &f{message}"
  chat-format: "&8[&4SPY&8] &f{sender}&8: &f{message}"

# ── Filters ────────────────────────────────────────────────────────────────────

filter:
  blocked: "&cMessage blocked"
  warning: "&6Warning"

# ── Cooldowns ──────────────────────────────────────────────────────────────────

cooldown:
  wait: "&cPlease wait &f{time} &cseconds"

# ── Anti-Spam ──────────────────────────────────────────────────────────────────

antispam:
  caps: "&cPlease don't shout"
  repeat: "&cPlease don't repeat characters"
  similar: "&cPlease don't send the same message"

# ── Clear Chat ─────────────────────────────────────────────────────────────────

clearchat:
  cleared: "&aChat cleared by &f{player}"

# ── Errors ─────────────────────────────────────────────────────────────────────

errors:
  no-permission: "&cNo permission"
  player-not-found: "&cPlayer not found"
  invalid-usage: "&cUsage: &f{usage}"

# ── General ────────────────────────────────────────────────────────────────────

general:
  no-permission: "&cYou don't have permission!"
  players-only: "&cThis command is for players only!"
  config-reloaded: "&aConfiguration reloaded!"
  invalid-player: "&cPlayer &f{player} &cnot found!"
  cooldown-active: "&cPlease wait &f{time}&cs"
  command-disabled: "&cCommand disabled!"

# ── Hub ────────────────────────────────────────────────────────────────────────

hub:
  connecting: "&aConnecting to &f{server}&a..."

# ── Mute ───────────────────────────────────────────────────────────────────────

mute:
  muted: "&aPlayer &f{player} &amuted for &f{time}"
  unmuted: "&aPlayer &f{player} &aunmuted"
  already-muted: "&7Player &f{player} &7is already muted"
  not-muted: "&7Player &f{player} &7is not muted"
  you-muted: "&cYou are muted! &7Remaining: &f{time}"
  permanent: "&cYou are permanently muted!"

# ── Gradients ──────────────────────────────────────────────────────────────────

gradient:
  color-set: "&aGradient set!"
  color-enabled: "&aGradient nickname enabled"
  color-disabled: "&7Gradient nickname disabled"
  color-reset: "&7Gradient reset"
  prefix-set: "&aPrefix set!"
  prefix-reset: "&7Prefix reset"
  prefix-enabled: "&aPrefix enabled"
  prefix-disabled: "&7Prefix disabled"
  invalid-hex: "&cInvalid hex color: &f{color}"
  invalid-color: "&cInvalid color: &f{color}"
  too-many-colors: "&cToo many colors! Maximum: &f{max}"
  too-few-colors: "&cToo few colors! Minimum: &f{min}"
  cooldown: "&cPlease wait &f{time} &cseconds"
  not-enough-points: "&cNot enough points! Need: &f{price}"
  player-not-found: "&cPlayer not found"
  color-help: "&cUsage: &f/color <hex1> <hex2> ..."
  color-success: "&aGradient applied!"
  color-no-colors: "&7You have no colors set"
  prefix-help: "&cUsage: &f/prefix <text>"
  prefix-success: "&aPrefix set!"
  prefix-success-free: "&aPrefix set!"
  prefix-no-prefix: "&7You have no prefix"
  prefix-too-long: "&cPrefix too long! Max: &f{max}"
  prefix-no-colors: "&cPrefix cannot contain color codes"
  only-player: "&cPlayers only!"
  no-permission: "&cNo permission!"
  reload-success: "&aConfiguration reloaded!"
  info-header: "&8\u2500\u2500\u2500\u2500\u2500 &f{player} &8\u2500\u2500\u2500\u2500\u2500"
  info-prefix: "&7Prefix: &f{prefix}"
  info-colors: "&7Colors: &f{colors}"

# ── Custom Nicknames ───────────────────────────────────────────────────────────

nick:
  current: "&7Your nickname: &f{nick}"
  usage: "&cUsage: &f/nick <name> &7or &f/nick reset"
  no-nick: "&7You have no custom nickname"
  reset-success: "&aNickname reset!"
  set-success: "&aNickname changed to: &f{nick}"
  invalid: "&cInvalid nickname!"
  taken: "&cThis nickname is already taken!"
  error: "&cFailed to set nickname!"

# ── RP Commands ────────────────────────────────────────────────────────────────

rp:
  me: "&7* {player} {action}"
  try-format: "&7* {player} tries {action}... &f{result}"
  try-success: "&a[Success!]"
  try-fail: "&c[Fail!]"
  do-format: "&8[Scene] &f{description} &7({player})"
  roll-format: "&7* {player} rolls &f{result} &7out of &f{max}"
  roll-min-error: "&cMinimum dice value: 2"
  roll-max-error: "&cMaximum dice value: 1000000"
  roll-invalid-number: "&cPlease specify a number: /roll [max]"
