# LoChat sound configuration
# Controls sound effects for chat events, moderation, and system actions.

# ── General ────────────────────────────────────────────────────────────────────

settings:
  enabled: true
  global-volume: 0.5
  global-pitch: 1.0
  allow-disable: true
  toggle-command: "/sounds"

# ── Message Sounds ─────────────────────────────────────────────────────────────

messages:
  private-message:
    enabled: true
    sound: BLOCK_NOTE_BLOCK_PLING
    volume: 0.8
    pitch: 1.2
    receiver-only: true

  mention:
    enabled: true
    sound: BLOCK_NOTE_BLOCK_BELL
    volume: 0.7
    pitch: 1.5
    everyone-sound: BLOCK_NOTE_BLOCK_CHIME

  global-chat:
    enabled: false
    sound: UI_BUTTON_CLICK
    volume: 0.3
    pitch: 1.0

  local-chat:
    enabled: false
    sound: UI_BUTTON_CLICK
    volume: 0.2
    pitch: 0.8

  announcement:
    enabled: true
    sound: BLOCK_NOTE_BLOCK_CHIME
    volume: 1.0
    pitch: 1.0
    important-sound: ENTITY_ENDER_DRAGON_GROWL

# ── System Sounds ──────────────────────────────────────────────────────────────

system:
  join:
    enabled: false
    sound: ENTITY_PLAYER_LEVELUP
    volume: 0.5
    pitch: 1.0
    self-only: true

  quit:
    enabled: false
    sound: BLOCK_NOTE_BLOCK_BASS
    volume: 0.3
    pitch: 0.8

  mute:
    enabled: true
    sound: BLOCK_ANVIL_LAND
    volume: 0.6
    pitch: 0.5
    target-sound: ENTITY_VILLAGER_NO

  unmute:
    enabled: true
    sound: ENTITY_PLAYER_LEVELUP
    volume: 0.7
    pitch: 1.2
    target-sound: ENTITY_VILLAGER_YES

  clear-chat:
    enabled: true
    sound: ITEM_BUCKET_EMPTY
    volume: 0.5
    pitch: 1.5

# ── Gradient Sounds ────────────────────────────────────────────────────────────

gradient:
  color-set:
    enabled: true
    sound: BLOCK_NOTE_BLOCK_HARP
    volume: 0.6
    pitch: 1.3

  color-reset:
    enabled: true
    sound: BLOCK_NOTE_BLOCK_BASS
    volume: 0.4
    pitch: 0.7

  prefix-set:
    enabled: true
    sound: BLOCK_NOTE_BLOCK_CHIME
    volume: 0.7
    pitch: 1.4

  error:
    enabled: true
    sound: ENTITY_VILLAGER_NO
    volume: 0.5
    pitch: 0.8

# ── Command Sounds ─────────────────────────────────────────────────────────────

commands:
  success:
    enabled: false
    sound: ENTITY_EXPERIENCE_ORB_PICKUP
    volume: 0.4
    pitch: 1.2

  error:
    enabled: true
    sound: ENTITY_VILLAGER_NO
    volume: 0.5
    pitch: 0.8

  no-permission:
    enabled: true
    sound: BLOCK_NOTE_BLOCK_BASS
    volume: 0.6
    pitch: 0.5

  player-not-found:
    enabled: true
    sound: ENTITY_ITEM_BREAK
    volume: 0.4
    pitch: 0.6

# ── Filter Sounds ──────────────────────────────────────────────────────────────

filters:
  blocked:
    enabled: true
    sound: ENTITY_VILLAGER_NO
    volume: 0.6
    pitch: 0.7

  warning:
    enabled: true
    sound: BLOCK_NOTE_BLOCK_PLING
    volume: 0.5
    pitch: 0.9

  auto-fix:
    enabled: false
    sound: UI_BUTTON_CLICK
    volume: 0.3
    pitch: 1.1
