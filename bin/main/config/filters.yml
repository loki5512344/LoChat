# LoChat chat filters
# Control spam, swearing, URLs, and other unwanted content.

# ── Swear Filter ───────────────────────────────────────────────────────────────
# Uses badwords.txt for the word list.
# Bypass permission: lochat.bypass.swear

swear:
  enabled: true
  replace: false
  replacement: "***"

# ── URL Filter ─────────────────────────────────────────────────────────────────
# Blocks URLs in messages.
# Bypass permission: lochat.bypass.urlfilter

url:
  enabled: true
  replacement: "&7[URL hidden]"

# ── IP Filter ──────────────────────────────────────────────────────────────────
# Blocks IP addresses in messages.
# Bypass permission: lochat.bypass.ipfilter

ip:
  enabled: true
  replacement: "&7[IP hidden]"

# ── Hidden URL Filter ──────────────────────────────────────────────────────────
# Blocks known link shorteners and invite links.
# Bypass permission: lochat.bypass.hiddenurls

hidden-urls:
  enabled: true
  patterns:
    - "discord\\.gg"
    - "dsc\\.gg"
    - "bit\\.ly"
    - "tinyurl\\.com"
    - "goo\\.gl"

# ── Spam Filter ────────────────────────────────────────────────────────────────
# Blocks messages with excessive repeated characters.
# Bypass permission: lochat.bypass.spam

spam:
  enabled: true
  max-repeating-chars: 5

# ── Flood Filter ───────────────────────────────────────────────────────────────
# Blocks identical messages sent in quick succession.
# Bypass permission: lochat.bypass.flood

flood:
  enabled: true
  max-same-messages: 3

# ── CAPS Filter ────────────────────────────────────────────────────────────────
# Blocks messages with too many capital letters.
# Bypass permission: lochat.bypass.caps

caps:
  enabled: true
  max-caps-percent: 70
  min-length: 5
