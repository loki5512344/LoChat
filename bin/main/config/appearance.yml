# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║                          LoChat Chat Appearance Config                     ║
# ║                           Настройки внешнего вида чата                     ║
# ║                           Цветовая гамма: Spacelegacy                      ║
# ║                           #B798A8 → #7858E9 (розово-фиолетовый)            ║
# ╚══════════════════════════════════════════════════════════════════════════════╝

# ┌─────────────────────────────────────────────────────────────────────────────┐
# │                            ПРЕФИКСЫ ЧАТА                                   │
# └─────────────────────────────────────────────────────────────────────────────┘
#
#  Градиент: ровно 2 цвета — от и до. Интерполяция плавная между ними.
#  Вся гамма сервера: светлый #B798A8 (пыльная роза) → тёмный #7858E9 (фиолет)

prefixes:
  global:
    emoji: "✦"
    text: "GLOBAL"
    colors:
      - "#B798A8"
      - "#7858E9"
    separator:
      text: " ▶ "
      color: "#9878C9"
    message-color: "#E8E0F0"

  local:
    emoji: "◆"
    text: "LOCAL"
    colors:
      - "#9878C9"
      - "#7858E9"
    separator:
      text: " ▶ "
      color: "#8B6BD6"
    message-color: "#E8E0F0"

# ┌─────────────────────────────────────────────────────────────────────────────┐
# │                        ФОРМАТ СООБЩЕНИЙ В ЧАТЕ                             │
# └─────────────────────────────────────────────────────────────────────────────┘
#
# Доступные плейсхолдеры:
#   {emoji}          - эмодзи префикса (✦ или ◆)
#   {prefix}         - текст префикса с градиентом (GLOBAL или LOCAL)
#   {separator}      - разделитель (▶)
#   {player_prefix}  - префикс игрока из LuckPerms/градиента
#   {player}         - ник игрока с hover
#   {message}        - текст сообщения
#
# Примеры форматов:
#   По умолчанию:  {emoji} {prefix} {separator} {player} : {message}
#   Минимальный:   {player_prefix} {player} ▶ {message}
#   Кастомный:     ✦ {player_prefix} {player} ▶ {message}

chat-format:
  # Формат для глобального чата
  global: "{emoji} {prefix} {separator} {player} : {message}"
  
  # Формат для локального чата
  local: "{emoji} {prefix} {separator} {player} : {message}"

# ┌─────────────────────────────────────────────────────────────────────────────┐
# │                            HOVER ЭФФЕКТЫ                                   │
# └─────────────────────────────────────────────────────────────────────────────┘

hover:
  enabled: true
  format:
    - "&#7858E9▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬"
    - "&#B798A8✦ &f{player}"
    - ""
    - "&#9878C9⏱ &fПинг: &#7858E9{ping}ms"
    - "&#9878C9❤ &fЗдоровье: &#7858E9{health}/20"
    - "&#9878C9🍖 &fГолод: &#7858E9{food}/20"
    - ""
    - "&#7858E9▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬"
    - "&#B798A8✦ &fНажми чтобы написать"

# ┌─────────────────────────────────────────────────────────────────────────────┐
# │                            ЭМОДЗИ ЗАМЕНЫ                                   │
# └─────────────────────────────────────────────────────────────────────────────┘

emojis:
  ":heart:": "❤"
  ":hearts:": "♥"
  ":star:": "★"
  ":stars:": "✦"
  ":diamond:": "♦"
  ":check:": "✓"
  ":cross:": "✗"
  ":arrow:": "→"
  ":up:": "↑"
  ":down:": "↓"
  ":left:": "←"
  ":right:": "→"
  ":music:": "♪"
  ":note:": "♫"
  ":smile:": ":)"
  ":sad:": ":("
  ":wink:": ";)"
  ":shrug:": "¯\\_(ツ)_/¯"

# ┌─────────────────────────────────────────────────────────────────────────────┐
# │                            НАСТРОЙКИ ЧАТА                                  │
# └─────────────────────────────────────────────────────────────────────────────┘

chat:
  local_radius: 100
  clear_lines: 100
  min_message_length: 1
  max_message_length: 2000
  colors:
    nobody_heard: "#9878C9"
    error: "#CF6679"
    success: "#9878C9"
    warning: "#B798A8"
    info: "#A485BC"

# ┌─────────────────────────────────────────────────────────────────────────────┐
# │                            DISCORD ИНТЕГРАЦИЯ                              │
# └─────────────────────────────────────────────────────────────────────────────┘

discord:
  emojis:
    global_chat: "✦"
    local_chat: "◆"
    player_join: "♦"
    player_quit: "◈"
    player_death: "✗"
  avatar_urls:
    default: "https://mc-heads.net/avatar/minecraft/64"
    player: "https://mc-heads.net/avatar/{player}/64"
  default_embed_color: "7858E9"
  event_titles:
    join: "♦ Игрок зашел на сервер"
    quit: "◈ Игрок покинул сервер"
    death: "✗ Смерть игрока"
    global_chat: "✦ Глобальный чат"
    local_chat: "◆ Локальный чат"
