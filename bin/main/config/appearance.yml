# LoChat chat appearance
# Controls how messages look in-game: prefixes, format, hover, emojis.

# ── Chat Prefixes ──────────────────────────────────────────────────────────────

prefixes:
  global:
    emoji: "\u2726"
    text: "GLOBAL"
    separator: " \u25B6 "
    message-color: "&7"

  local:
    emoji: "\u25C6"
    text: "LOCAL"
    separator: " \u25B6 "
    message-color: "&7"

# ── Chat Format ────────────────────────────────────────────────────────────────
# Placeholders:
#   {emoji}, {prefix}, {separator}
#   {player_prefix}, {player}, {player_suffix}
#   {message}

chat-format:
  global: "{emoji} {prefix}{separator}{player_prefix}{player}{player_suffix}&f: {message}"
  local: "{emoji} {prefix}{separator}{player_prefix}{player}{player_suffix}&f: {message}"

# ── Hover on Player Name ───────────────────────────────────────────────────────

hover:
  enabled: true
  format:
    - "&8\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550"
    - " \u2726 &f{player}"
    - ""
    - " &7Ping: &b{ping}ms"
    - " &7Health: &a{health}&7/20"
    - " &7Food: &6{food}&7/20"
    - ""
    - "&8\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550"
    - " &7Click to message"

# ── Emoji Shortcuts ────────────────────────────────────────────────────────────
# Text shortcuts replaced in outgoing messages before processing.

emojis:
  ":heart:": "\u2764"
  ":hearts:": "\u2665"
  ":star:": "\u2605"
  ":stars:": "\u2726"
  ":diamond:": "\u2666"
  ":check:": "\u2713"
  ":cross:": "\u2717"
  ":arrow:": "\u2192"
  ":up:": "\u2191"
  ":down:": "\u2193"
  ":left:": "\u2190"
  ":right:": "\u2192"
  ":music:": "\u266A"
  ":note:": "\u266B"
  ":smile:": ":)"
  ":sad:": ":("
  ":shrug:": "\u00AF\\_(\u30C4)_/\u00AF"

# ── Chat Settings ──────────────────────────────────────────────────────────────

chat:
  local-radius: 100
  clear-lines: 100
  min-message-length: 1
  max-message-length: 2000
  colors:
    nobody-heard: "&7"
    error: "&c"
    success: "&a"
    warning: "&6"
    info: "&7"

# ── Discord Embeds ─────────────────────────────────────────────────────────────

discord:
  emojis:
    global-chat: "\u2726"
    local-chat: "\u25C6"
    player-join: "\u25C6"
    player-quit: "\u25C7"
    player-death: "\u2717"
  avatar-urls:
    default: "https://mc-heads.net/avatar/minecraft/64"
    player: "https://mc-heads.net/avatar/{player}/64"
  default-embed-color: "3498DB"
  event-titles:
    join: "Player joined"
    quit: "Player left"
    death: "Player died"
    global-chat: "Global Chat"
    local-chat: "Local Chat"
