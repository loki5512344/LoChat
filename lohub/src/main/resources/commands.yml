# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║                        LoHub Custom Commands Configuration                  ║
# ║                   Create custom commands with actions                       ║
# ╚══════════════════════════════════════════════════════════════════════════════╝
#
# ACTIONS:
#   [MESSAGE] text - Send message to player
#   [BROADCAST] text - Broadcast to all players
#   [TITLE] title;subtitle;fadeIn;stay;fadeOut - Send title
#   [ACTIONBAR] text - Send actionbar message
#   [SOUND] sound - Play sound
#   [COMMAND] command - Execute as player
#   [CONSOLE] command - Execute as console
#   [GAMEMODE] mode - Change gamemode
#   [EFFECT] effect;level - Give potion effect
#   [CLOSE] - Close inventory
#
# PLACEHOLDERS:
#   %player% - Player name
#   %player_displayname% - Player display name
#   %online% - Online players count
#   %online_max% - Max players
#
# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~#
# | CUSTOM COMMANDS                          |
# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~#

custom_commands:
  # Discord command
  discord:
    aliases:
      - discord
      - дискорд
      - ds
    permission: null  # null = no permission required
    actions:
      - "[MESSAGE] &#9B59B6Discord: &#FFFFFFdiscord.example.net"
      - "[SOUND] BLOCK_NOTE_BLOCK_PLING"
  
  # Website command
  website:
    aliases:
      - website
      - site
      - сайт
      - web
    permission: null
    actions:
      - "[MESSAGE] &#00D4FFWebsite: &#FFFFFFwww.example.net"
      - "[SOUND] BLOCK_NOTE_BLOCK_PLING"
  
  # Store command
  store:
    aliases:
      - store
      - shop
      - магазин
      - донат
    permission: null
    actions:
      - "[MESSAGE] &#FF6B6BStore: &#FFFFFFstore.example.net"
      - "[SOUND] BLOCK_NOTE_BLOCK_PLING"
  
  # Clear inventory command (admin only)
  clearinventory:
    aliases:
      - ci
      - clearinv
      - очиститьинв
    permission: lohub.admin
    actions:
      - "[CONSOLE] minecraft:clear %player%"
      - "[MESSAGE] {prefix}&#6BCB77Your inventory has been cleared!"
      - "[SOUND] ENTITY_ITEM_PICKUP"
  
  # Heal command (admin only)
  heal:
    aliases:
      - heal
      - хил
    permission: lohub.admin
    actions:
      - "[CONSOLE] minecraft:effect give %player% minecraft:instant_health 1 10 true"
      - "[CONSOLE] minecraft:effect give %player% minecraft:saturation 1 10 true"
      - "[MESSAGE] {prefix}&#6BCB77You have been healed!"
      - "[SOUND] ENTITY_PLAYER_LEVELUP"
  
  # Rules command
  rules:
    aliases:
      - rules
      - правила
    permission: null
    actions:
      - "[MESSAGE] &r"
      - "[MESSAGE] &#FFD700╔═══ Server Rules ═══╗"
      - "[MESSAGE] &r"
      - "[MESSAGE] &#6BCB771. Be respectful to all players"
      - "[MESSAGE] &#6BCB772. No cheating or hacking"
      - "[MESSAGE] &#6BCB773. No spam in chat"
      - "[MESSAGE] &#6BCB774. Follow staff instructions"
      - "[MESSAGE] &#6BCB775. Have fun!"
      - "[MESSAGE] &r"
      - "[MESSAGE] &#FFD700╚═══════════════════════╝"
      - "[SOUND] BLOCK_NOTE_BLOCK_PLING"
