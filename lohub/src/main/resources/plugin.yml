name: LoHub
version: '1.5.5-1.20.1'
main: com.loki.lohub.LoHub
api-version: '1.20'
folia-supported: true
author: loki
description: Hub plugin for Paper/Folia with WorldGuard integration

softdepend:
  - WorldGuard
  - WorldEdit

commands:
  hub:
    description: Teleport to spawn
    usage: /hub
    permission: lohub.hub
    aliases: [spawn, хаб, спавн]
  
  sethub:
    description: Set hub spawn location
    usage: /sethub
    permission: lohub.admin
    aliases: [setspawn, установитьспавн]
  
  lohub:
    description: LoHub admin command
    usage: /lohub [reload]
    permission: lohub.admin

permissions:
  lohub.hub:
    description: Can use /hub command
    default: true
  lohub.admin:
    description: Admin permissions
    default: op
  lohub.bypass.protection:
    description: Bypass world protection
    default: op
