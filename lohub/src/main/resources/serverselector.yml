# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║                      LoHub Server Selector Configuration                   ║
# ║                    GUI menu for server selection                           ║
# ╚══════════════════════════════════════════════════════════════════════════════╝
#
# This file defines the server selector GUI that players can open
# You can customize the items, layout, and actions
#
# ITEM ACTIONS:
#   [MESSAGE] text - Send message to player
#   [BROADCAST] text - Broadcast to all players
#   [TITLE] title;subtitle;fadeIn;stay;fadeOut - Send title
#   [ACTIONBAR] text - Send actionbar message
#   [SOUND] sound - Play sound
#   [COMMAND] command - Execute as player
#   [CONSOLE] command - Execute as console
#   [PROXY] server - Send player to BungeeCord/Velocity server
#   [CLOSE] - Close inventory
#
# ITEM FLAGS:
#   - HIDE_ATTRIBUTES
#   - HIDE_DESTROYS
#   - HIDE_ENCHANTS
#   - HIDE_PLACED_ON
#   - HIDE_POTION_EFFECTS
#   - HIDE_UNBREAKABLE
#
# PLAYER HEADS:
#   material: PLAYER_HEAD
#   username: <player_name>  # OR
#   base64: <base64_texture>
#
# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~#
# | SERVER SELECTOR GUI                      |
# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~#

# GUI settings
gui:
  # Title of the inventory
  title: "&#FFD700S&#FFC700e&#FFB700r&#FFA700v&#FF9700e&#FF8700r &#FF7700S&#FF6700e&#FF5700l&#FF4700e&#FF3700c&#FF2700t&#FF1700o&#FF0700r"
  
  # Number of rows (1-6, each row = 9 slots)
  rows: 3
  
  # Auto-update GUI (for placeholders)
  refresh:
    enabled: false
    rate: 40  # In ticks (20 ticks = 1 second)

# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~#
# | GUI ITEMS                                |
# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~#

items:
  # Filler item (decorative glass)
  filler:
    material: GRAY_STAINED_GLASS_PANE
    slot: -1  # -1 = fill all empty slots
    amount: 1
    display_name: " "
    item_flags:
      - HIDE_ATTRIBUTES
  
  # Survival server
  survival:
    material: GRASS_BLOCK
    slot: 11
    amount: 1
    glow: true
    display_name: "&#6BCB77S&#62C973u&#5AC76Fr&#51C56Bv&#49C367i&#40C163v&#38BF5Fa&#2FBD5Bl"
    lore:
      - ""
      - "&#AAAAAAClassic survival experience"
      - "&#AAAAAABuild, mine, and survive!"
      - ""
      - "&#FFD700Click to join!"
    actions:
      - "[CLOSE]"
      - "[MESSAGE] {prefix}&#6BCB77Connecting to Survival..."
      - "[SOUND] ENTITY_ENDERMAN_TELEPORT"
      # For BungeeCord/Velocity:
      # - "[PROXY] survival"
      # For Multiverse-Core (multi-world):
      # - "[CONSOLE] mvtp %player% survival_world"
  
  # Creative server
  creative:
    material: COMMAND_BLOCK
    slot: 13
    amount: 1
    glow: true
    display_name: "&#FF6B6BC&#FF5757r&#FF4343e&#FF2F2Fa&#FF1B1Bt&#FF0707i&#F30000v&#DF0000e"
    lore:
      - ""
      - "&#AAAAAAUnlimited creativity!"
      - "&#AAAAAABuild anything you imagine"
      - ""
      - "&#FFD700Click to join!"
    actions:
      - "[CLOSE]"
      - "[MESSAGE] {prefix}&#FF6B6BConnecting to Creative..."
      - "[SOUND] ENTITY_ENDERMAN_TELEPORT"
      # For BungeeCord/Velocity:
      # - "[PROXY] creative"
      # For Multiverse-Core:
      # - "[CONSOLE] mvtp %player% creative_world"
  
  # Minigames server
  minigames:
    material: DIAMOND_SWORD
    slot: 15
    amount: 1
    glow: true
    display_name: "&#9B59B6M&#8E4FB0i&#8145AAn&#7A3BA4i&#6D319Eg&#603798a&#532D92m&#462389e&#39197Fs"
    lore:
      - ""
      - "&#AAAAAAFun minigames and competitions"
      - "&#AAAAAAPlay with friends!"
      - ""
      - "&#FFD700Click to join!"
    actions:
      - "[CLOSE]"
      - "[MESSAGE] {prefix}&#9B59B6Connecting to Minigames..."
      - "[SOUND] ENTITY_ENDERMAN_TELEPORT"
      # For BungeeCord/Velocity:
      # - "[PROXY] minigames"
  
  # Close button
  close:
    material: BARRIER
    slot: 22
    amount: 1
    display_name: "&#FF6B6BClose"
    lore:
      - ""
      - "&#AAAAAAClick to close this menu"
    actions:
      - "[CLOSE]"
      - "[SOUND] BLOCK_CHEST_CLOSE"
