name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build
        run: chmod +x gradlew && ./gradlew clean build --no-daemon

      - name: Generate Checksums
        run: |
          cd build/libs/
          sha256sum LoChat-*.jar > LoChat-${GITHUB_REF_NAME#v}.jar.sha256
          cat LoChat-${GITHUB_REF_NAME#v}.jar.sha256

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "LoChat ${{ github.ref_name }}"
          body: |
            ## LoChat ${{ github.ref_name }}

            **Server:** Paper/Folia 1.21+ · **Java:** 21

            ### Installation
            Copy the `LoChat-*.jar` into your server's `plugins/` folder and restart.

            ### Optional Dependencies
            - PlaceholderAPI
            - PlayerPoints
            - LuckPerms
            - SkinsRestorer
            - LibertyBans

            ### Changelog
            See the full list of changes below.
          files: |
            build/libs/LoChat-*.jar
            build/libs/LoChat-*.sha256
          generate_release_notes: true
