name: Build & Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build LoChat
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build & Test
        run: ./gradlew build --no-daemon

      - name: JaCoCo Report
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: build/reports/jacoco/test/html/

      - name: Test Results
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: build/test-results/

      - name: Plugin JAR
        uses: actions/upload-artifact@v4
        with:
          name: LoChat-Plugin
          path: build/libs/LoChat-*.jar
